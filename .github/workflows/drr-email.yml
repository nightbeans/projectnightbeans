name: DRR Trial Email                                                                                                                                              
                                                                                                                                                                     
  on:
    push:                                                                                                                                                            
      branches: [main]
      paths: ['work/drr_data.json']
    workflow_dispatch:

  jobs:
    send-email:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
                                                                                                                                                                     
        - name: Send daily DRR summary email
          env:                                                                                                                                                       
            SMTP_USER: ${{ secrets.SMTP_USER }}
            SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}                                                                                                              
            EMAIL_TO: ${{ secrets.EMAIL_TO }}
          run: |                                                                                                                                                     
            python3 - <<'EOF'
  import json, smtplib, os                                                                                                                                           
  from email.mime.multipart import MIMEMultipart
  from email.mime.text import MIMEText                                                                                                                               
                                                                                                                                                                     
  with open('work/drr_data.json') as f:
      data = json.load(f)                                                                                                                                            
                  
  rows = data['rows']
  generated_at = data.get('generated_at', '')
  TRIAL_START = '2026-04-22'                                                                                                                                         
  BASELINES = {'Ibiade Ogun':118,'Iwopin Ogun':107,'Kajola Ondo':93,
               'Oba Akoko Ondo':152,'Sobe Edo':113,'Ute Ondo':204}                                                                                                   
  HUB_ORDER = ['Ibiade Ogun','Iwopin Ogun','Kajola Ondo','Oba Akoko Ondo','Sobe Edo','Ute Ondo']                                                                     
                                                                                                                                                                     
  by_hub = {}                                                                                                                                                        
  for r in rows:                                                                                                                                                     
      by_hub.setdefault(r['hub_name'], []).append(r)

  yesterday_date = max(r['date'] for r in rows)                                                                                                                      
  trial_days = len(set(r['date'] for r in rows if r['date'] >= TRIAL_START))
                                                                                                                                                                     
  def drr(r): return r['inc'] / r['av']                                                                                                                              
  def avg(lst): return sum(lst)/len(lst) if lst else None                                                                                                            
                                                                                                                                                                     
  def color_pct(pct):
      if pct is None: return '#888'                                                                                                                                  
      if pct >= -10: return '#3a6b10'
      if pct >= -30: return '#7a4b0a'
      return '#9b2c2c'                                                                                                                                               
   
  def fmt_delta(pct):                                                                                                                                                
      if pct is None: return '<span style="color:#888">—</span>'
      c = color_pct(pct)
      s = ('+' if pct>=0 else '') + str(round(pct)) + '%'                                                                                                            
      return f'<span style="color:{c};font-weight:600">{s}</span>'
                                                                                                                                                                     
  rows_html = ''  
  alerts = []                                                                                                                                                        
  for hub in HUB_ORDER:
      hub_rows = sorted(by_hub.get(hub, []), key=lambda r: r['date'])
      if not hub_rows: continue                                                                                                                                      
      baseline = BASELINES.get(hub, 0)
      pre = [r for r in hub_rows if r['date'] < TRIAL_START]                                                                                                         
      trial = [r for r in hub_rows if r['date'] >= TRIAL_START]                                                                                                      
      last = hub_rows[-1]
                                                                                                                                                                     
      yd_drr = drr(last)
      trial_avg = avg([drr(r) for r in trial])                                                                                                                       
      pre_avg = avg([drr(r) for r in pre])                                                                                                                           
      db = (trial_avg - baseline) / baseline * 100 if trial_avg else None
      dp = (trial_avg - pre_avg) / pre_avg * 100 if trial_avg and pre_avg else None                                                                                  
      sh = round(last['r24'] / last['rt'] * 100) if last['rt'] else None
                                                                                                                                                                     
      rows_html += f'''<tr style="border-bottom:1px solid #f0ede4">
        <td style="padding:7px 10px;font-weight:500">{hub}</td>                                                                                                      
        <td style="padding:7px 10px;font-family:monospace;text-align:right">&#8358;{round(yd_drr)}</td>                                                              
        <td style="padding:7px 10px;font-family:monospace;text-align:right">&#8358;{round(trial_avg) if trial_avg else "—"}</td>
        <td style="padding:7px 10px;font-family:monospace;text-align:right">&#8358;{baseline}</td>                                                                   
        <td style="padding:7px 10px;text-align:right">{fmt_delta(db)}</td>                                                                                           
        <td style="padding:7px 10px;text-align:right">{fmt_delta(dp)}</td>                                                                                           
        <td style="padding:7px 10px;font-family:monospace;text-align:right">{"—" if sh is None else str(sh)+"%"}</td>                                                
      </tr>'''                                                                                                                                                       
                  
      hub_alerts = []                                                                                                                                                
      if sh is not None and sh < 75:
          hub_alerts.append(f'24hr share {sh}% (below 75%)')                                                                                                         
      if len(trial) >= 2:
          swing = (yd_drr - drr(trial[-2])) / drr(trial[-2]) * 100                                                                                                   
          if abs(swing) > 20:
              hub_alerts.append(f'DRR {"+" if swing>=0 else ""}{round(swing)}% day-on-day')                                                                          
      if hub_alerts:
          alerts.append(f'<li style="margin-bottom:3px"><b>{hub}:</b> {"; ".join(hub_alerts)}</li>')                                                                 
                                                                                                                                                                     
  alert_block = ''
  if alerts:                                                                                                                                                         
      alert_block = f'''<div style="padding:0 18px 14px">
    <div style="font-size:12px;color:#7a4b0a;background:#fef7ec;border-radius:6px;padding:10px 12px">                                                                
      <b>Flags</b><ul style="margin:6px 0 0;padding-left:18px;line-height:1.6">{"".join(alerts)}</ul>                                                                
    </div></div>'''                                                                                                                                                  
                                                                                                                                                                     
  html = f'''<!DOCTYPE html><html><head><meta charset="UTF-8"></head>                                                                                                
  <body style="font-family:-apple-system,sans-serif;background:#faf8f3;margin:0;padding:16px">
  <div style="max-width:600px;margin:0 auto;background:#fff;border-radius:10px;border:1px solid #e8e5dc;overflow:hidden">                                            
    <div style="background:#faf8f3;padding:14px 18px;border-bottom:1px solid #e8e5dc">                                                                               
      <div style="font-size:16px;font-weight:600;margin-bottom:2px">ASP 600NGN Trial &#183; DRR Report</div>                                                         
      <div style="font-size:12px;color:#6b6b62">Data for {yesterday_date} &#183; trial day {trial_days} &#183; {generated_at[:10]}</div>                             
    </div>                                                                                                                                                           
    <div style="padding:14px 18px">                                                                                                                                  
      <table style="width:100%;border-collapse:collapse;font-size:13px">                                                                                             
        <thead><tr style="border-bottom:2px solid #e8e5dc;color:#6b6b62;font-size:11px;text-transform:uppercase">                                                    
          <th style="padding:5px 10px;text-align:left;font-weight:500">Hub</th>                                                                                      
          <th style="padding:5px 10px;text-align:right;font-weight:500">Yday</th>                                                                                    
          <th style="padding:5px 10px;text-align:right;font-weight:500">Trial avg</th>                                                                               
          <th style="padding:5px 10px;text-align:right;font-weight:500">Baseline</th>
          <th style="padding:5px 10px;text-align:right;font-weight:500">&#916; baseline</th>                                                                         
          <th style="padding:5px 10px;text-align:right;font-weight:500">&#916; pre-ASP</th>
          <th style="padding:5px 10px;text-align:right;font-weight:500">24hr%</th>                                                                                   
        </tr></thead>                                                                                                                                                
        <tbody>{rows_html}</tbody>                                                                                                                                   
      </table>                                                                                                                                                       
    </div>        
    {alert_block}
    <div style="padding:10px 18px;border-top:1px solid #e8e5dc;font-size:11px;color:#b0ae9f">
      Policy change 22 Apr 2026 &#183; hubs 274,278,279,296,300,313 &#183;                                                                                           
      <a href="https://joeldelaney.com/work/asp_600_trial.html" style="color:#6b6b62">view dashboard</a>                                                             
    </div>                                                                                                                                                           
  </div></body></html>'''                                                                                                                                            
                  
  msg = MIMEMultipart('alternative')                                                                                                                                 
  msg['Subject'] = f'DRR · {yesterday_date} · day {trial_days}'
  msg['From'] = os.environ['SMTP_USER']
  msg['To'] = os.environ['EMAIL_TO']                                                                                                                                 
  msg.attach(MIMEText(html, 'html'))
                                                                                                                                                                     
  with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
      s.login(os.environ['SMTP_USER'], os.environ['SMTP_PASSWORD'])
      s.sendmail(os.environ['SMTP_USER'], os.environ['EMAIL_TO'], msg.as_string())                                                                                   
  print(f"Sent to {os.environ['EMAIL_TO']}")
  EOF
