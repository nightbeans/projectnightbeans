<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOPO · 4DX Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F5F0E8; --cream-dark: #EDE6D6; --cream-darker: #E3D9C4;
  --ink: #2C1810; --ink-light: #5C3D2E; --ink-faint: #9C7B6A;
  --terracotta: #C4622D; --terracotta-light: #E8956D; --terracotta-pale: #F5DDD0;
  --sage: #6B7C5C; --sage-light: #A3B48A; --sage-pale: #E4EBD8;
  --amber: #C4962D; --amber-pale: #F5EAD0;
  --rule: rgba(44,24,16,0.15); --rule-strong: rgba(44,24,16,0.3);
}
html { font-size: 16px; }
body { background: var(--cream); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; }

#pw-gate { position:fixed; inset:0; background:var(--ink); display:flex; align-items:center; justify-content:center; z-index:9999; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.pw-card { text-align:center; padding:2rem; max-width:360px; width:100%; }
.pw-logo { font-family:'Playfair Display',serif; font-size:1.6rem; color:#fff; font-weight:700; letter-spacing:0.04em; margin-bottom:0.3rem; }
.pw-sub { color:rgba(245,240,232,0.5); font-size:0.9rem; margin-bottom:2rem; font-style:italic; }
#pw-input { width:100%; padding:11px 14px; background:rgba(245,240,232,0.08); border:1px solid rgba(245,240,232,0.2); border-radius:4px; color:#fff; font-size:1rem; margin-bottom:0.75rem; outline:none; font-family:inherit; }
#pw-input:focus { border-color:rgba(245,240,232,0.5); }
#pw-btn { width:100%; padding:11px; background:var(--terracotta); color:#fff; border:none; border-radius:4px; font-size:1rem; font-weight:600; cursor:pointer; font-family:inherit; }
#pw-btn:hover { background:#b5572a; }
#pw-err { color:var(--terracotta-light); font-size:0.85rem; margin-top:0.75rem; display:none; }

#app { display:none; }

.masthead { background:var(--ink); color:var(--cream); padding:1.25rem 2.5rem; display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid var(--terracotta); }
.masthead-left { display:flex; align-items:baseline; gap:1.5rem; }
.masthead-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; letter-spacing:0.04em; }
.masthead-sub { font-size:0.9rem; color:var(--ink-faint); font-style:italic; }
.masthead-date { font-size:0.85rem; color:var(--ink-faint); text-align:right; line-height:1.5; }
.masthead-date strong { color:var(--cream); font-weight:400; }

.page { max-width:1200px; margin:0 auto; padding:2rem 2rem 4rem; }
.section-label { font-size:0.7rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:0.75rem; padding-bottom:0.4rem; border-bottom:0.5px solid var(--rule); }

.wig-panel { background:var(--ink); border-radius:4px; padding:2.5rem 3rem; margin-bottom:1.5rem; display:grid; grid-template-columns:1fr auto 1fr; gap:2rem; align-items:center; position:relative; overflow:hidden; }
.wig-panel::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--terracotta),var(--amber),var(--sage)); }
.wig-label { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:0.5rem; }
.wig-headline { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--cream-dark); font-style:italic; line-height:1.4; max-width:260px; }
.wig-headline strong { color:var(--cream); font-style:normal; font-weight:700; }
.wig-arc-wrap { display:flex; flex-direction:column; align-items:center; }
.arc-svg { width:200px; height:120px; }
.arc-current-val { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:700; color:var(--cream); line-height:1; margin-top:-1.5rem; text-align:center; }
.arc-current-val span { font-size:1.4rem; font-weight:400; color:var(--ink-faint); }
.arc-status { font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.25rem 0.75rem; border-radius:2px; font-weight:600; display:inline-block; margin-top:0.5rem; }
.arc-status.behind { background:rgba(196,98,45,0.2); color:var(--terracotta-light); }
.arc-status.closing { background:rgba(196,150,45,0.2); color:#D4A040; }
.arc-status.ontarget { background:rgba(107,124,92,0.2); color:var(--sage-light); }
.wig-stats { display:flex; flex-direction:column; gap:1.25rem; align-items:flex-end; }
.wig-stat { text-align:right; }
.wig-stat-val { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--cream); line-height:1; }
.wig-stat-val.positive { color:var(--sage-light); }
.wig-stat-val.negative { color:var(--terracotta-light); }
.wig-stat-label { font-size:0.75rem; color:var(--ink-faint); margin-top:0.15rem; }

.countdown-strip { background:var(--cream-darker); border:0.5px solid var(--rule-strong); border-radius:4px; padding:0.85rem 1.5rem; display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.countdown-left { font-size:0.8rem; color:var(--ink-light); font-style:italic; }
.countdown-left strong { color:var(--ink); font-style:normal; }
.countdown-weeks { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; }
.countdown-weeks span { font-size:0.85rem; font-weight:400; color:var(--ink-faint); margin-left:0.4rem; font-family:'Crimson Pro',serif; }
.weekly-needed { font-size:0.8rem; color:var(--ink-light); text-align:right; }
.weekly-needed strong { color:var(--terracotta); }

.portfolio-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
.portfolio-card { background:var(--cream-dark); border:0.5px solid var(--rule-strong); border-radius:4px; padding:1.25rem 1.5rem; position:relative; overflow:hidden; }
.portfolio-card::after { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.portfolio-card.red::after { background:var(--terracotta); }
.portfolio-card.amber::after { background:var(--amber); }
.portfolio-card.green::after { background:var(--sage); }
.portfolio-name { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; margin-bottom:0.75rem; display:flex; align-items:center; justify-content:space-between; }
.status-pip { display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:0.5rem; }
.status-pip.red { background:var(--terracotta); }
.status-pip.amber { background:var(--amber); }
.status-pip.green { background:var(--sage); }
.portfolio-drr { font-family:'Playfair Display',serif; font-size:2.2rem; font-weight:700; line-height:1; margin-bottom:0.3rem; }
.portfolio-drr.red { color:var(--terracotta); }
.portfolio-drr.amber { color:var(--amber); }
.portfolio-drr.green { color:var(--sage); }
.portfolio-meta { font-size:0.85rem; color:var(--ink-light); display:flex; gap:1.25rem; margin-top:0.5rem; }
.progress-track { width:100%; height:8px; background:var(--cream-darker); border-radius:4px; overflow:visible; position:relative; margin:1.25rem 0 0.4rem; }
.progress-fill { height:100%; border-radius:4px; }
.progress-fill.red { background:var(--terracotta); }
.progress-fill.amber { background:var(--amber); }
.progress-fill.green { background:var(--sage); }
.progress-target-marker { position:absolute; top:-4px; right:0; width:2px; height:16px; background:var(--sage); border-radius:1px; }
.progress-labels { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--ink-faint); }

.regions-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; margin-bottom:1.5rem; }
.region-card { background:var(--cream-dark); border:0.5px solid var(--rule); border-radius:3px; padding:0.75rem 1rem; display:flex; align-items:center; justify-content:space-between; position:relative; overflow:hidden; }
.region-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; }
.region-card.red::before { background:var(--terracotta); }
.region-card.amber::before { background:var(--amber); }
.region-card.green::before { background:var(--sage); }
.region-name { font-size:0.9rem; font-weight:600; }
.region-hubs { font-size:0.72rem; color:var(--ink-faint); margin-top:1px; }
.region-drr { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; }
.region-drr.red { color:var(--terracotta); }
.region-drr.amber { color:var(--amber); }
.region-drr.green { color:var(--sage); }
.kudos-badge { font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; background:var(--sage-pale); color:var(--sage); border:0.5px solid var(--sage-light); border-radius:2px; padding:0.1rem 0.4rem; margin-left:0.4rem; }

.leads-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
.lead-card { background:var(--cream-dark); border:0.5px solid var(--rule-strong); border-radius:4px; padding:1.5rem; }
.lead-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; margin-bottom:0.25rem; }
.lead-subtitle { font-size:0.8rem; color:var(--ink-faint); font-style:italic; margin-bottom:1.25rem; line-height:1.4; }
.lead-gauge-wrap { display:flex; align-items:flex-end; gap:1.25rem; margin-bottom:1rem; }
.lead-big-num { font-family:'Playfair Display',serif; font-size:3rem; font-weight:700; line-height:1; color:var(--sage); }
.lead-gauge-detail { flex:1; }
.lead-bar-track { height:6px; background:var(--cream-darker); border-radius:3px; margin-bottom:0.5rem; overflow:hidden; }
.lead-bar-fill { height:100%; border-radius:3px; background:var(--sage); }
.lead-counts { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--ink-faint); }
.lead-counts .flagged { color:var(--terracotta); font-weight:600; }

.table-wrap { background:var(--cream-dark); border:0.5px solid var(--rule-strong); border-radius:4px; overflow:hidden; margin-bottom:1rem; }
.data-table { width:100%; border-collapse:collapse; font-size:0.85rem; table-layout:fixed; }
.data-table th { padding:0.55rem 0.75rem; text-align:left; font-weight:600; font-size:0.68rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint); border-bottom:0.5px solid var(--rule-strong); }
.data-table th:first-child { padding-left:1rem; }
.data-table th:last-child { padding-right:1rem; }
.data-table td { padding:0.6rem 0.75rem; border-bottom:0.5px solid var(--rule); vertical-align:middle; }
.data-table td:first-child { padding-left:1rem; }
.data-table td:last-child { padding-right:1rem; }
.data-table tr:last-child td { border-bottom:none; }
.hub-row { cursor:pointer; transition:background 0.12s; }
.hub-row:hover { background:rgba(44,24,16,0.04); }
.expand-icon { font-size:0.65rem; color:var(--ink-faint); transition:transform 0.15s; display:inline-block; margin-left:0.35rem; }
.hub-row.open .expand-icon { transform:rotate(90deg); }
.agent-detail { display:none; background:rgba(44,24,16,0.03); }
.agent-detail.visible { display:table-row; }
.agent-inner { padding:0.5rem 0.75rem 0.75rem 2rem; }
.agent-table { width:100%; border-collapse:collapse; font-size:0.78rem; }
.agent-table th { padding:0.25rem 0.5rem; text-align:left; font-size:0.65rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-faint); border-bottom:0.5px solid var(--rule); }
.agent-table td { padding:0.3rem 0.5rem; border-bottom:0.5px solid rgba(44,24,16,0.06); }
.agent-table tr:last-child td { border-bottom:none; }

.action-tag { display:inline-block; font-size:0.62rem; letter-spacing:0.08em; text-transform:uppercase; font-weight:600; padding:0.15rem 0.5rem; border-radius:2px; white-space:nowrap; }
.action-tag.replace { background:var(--terracotta-pale); color:var(--terracotta); border:0.5px solid var(--terracotta-light); }
.action-tag.monitor { background:var(--amber-pale); color:var(--amber); border:0.5px solid #D4A040; }
.action-tag.on-target { background:var(--sage-pale); color:var(--sage); border:0.5px solid var(--sage-light); }
.action-tag.structural { background:rgba(44,24,16,0.06); color:var(--ink-light); border:0.5px solid var(--rule-strong); }

.notice { border-radius:4px; padding:0.75rem 1.25rem; font-size:0.82rem; color:var(--ink-light); display:flex; gap:0.6rem; align-items:flex-start; margin-bottom:1rem; }
.notice.amber { background:var(--amber-pale); border:0.5px solid #D4A040; }
.notice-label { font-weight:700; flex-shrink:0; color:var(--amber); }

.focus-header { border-radius:4px; padding:0.85rem 1.25rem; display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
.focus-header.investigate { background:var(--terracotta-pale); border:0.5px solid var(--terracotta-light); }
.focus-header.working { background:var(--sage-pale); border:0.5px solid var(--sage-light); }
.focus-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.focus-dot.investigate { background:var(--terracotta); }
.focus-dot.working { background:var(--sage); }
.focus-title { font-family:'Playfair Display',serif; font-weight:700; font-size:0.95rem; }
.focus-title.investigate { color:var(--terracotta); }
.focus-title.working { color:var(--sage); }

.stat-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:0.6rem; margin-bottom:1rem; }
.stat-card { border-radius:4px; padding:0.85rem 1rem; }
.stat-card-label { font-size:0.72rem; opacity:0.8; margin-bottom:0.25rem; }
.stat-card-val { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; line-height:1; }
.stat-card.neutral { background:var(--cream-dark); border:0.5px solid var(--rule); color:var(--ink); }
.stat-card.good { background:var(--sage-pale); border:0.5px solid var(--sage-light); color:var(--sage); }
.stat-card.warn { background:var(--amber-pale); border:0.5px solid #D4A040; color:var(--amber); }
.stat-card.bad { background:var(--terracotta-pale); border:0.5px solid var(--terracotta-light); color:var(--terracotta); }

.badge { border-radius:10px; padding:0.1rem 0.55rem; font-size:0.75rem; font-weight:700; display:inline-block; }
.badge.red { background:var(--terracotta); color:white; }
.subsection-label { font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-faint); margin:0.75rem 0 0.4rem; font-weight:600; }
.data-note { font-size:0.75rem; color:var(--ink-faint); font-style:italic; text-align:center; padding-top:1.5rem; border-top:0.5px solid var(--rule); line-height:1.6; }
.loading-msg { text-align:center; padding:4rem 2rem; font-size:0.9rem; color:var(--ink-faint); font-style:italic; }
.error-notice { background:var(--terracotta-pale); border:0.5px solid var(--terracotta-light); border-radius:4px; padding:0.75rem 1rem; font-size:0.82rem; color:var(--terracotta); margin-bottom:1rem; }
</style>
</head>
<body>

<div id="pw-gate">
  <div class="pw-card">
    <div class="pw-logo">MOPO · 4DX</div>
    <div class="pw-sub">Scoreboard</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkPw()">
    <button id="pw-btn" onclick="checkPw()">Continue</button>
    <div id="pw-err">Incorrect password — try again</div>
  </div>
</div>

<div id="app">
  <div class="masthead">
    <div class="masthead-left">
      <div class="masthead-title">MOPO · 4DX Scoreboard</div>
      <div class="masthead-sub">Nigeria MOPO50 · Weekly view</div>
    </div>
    <div class="masthead-date" id="masthead-date"></div>
  </div>
  <div class="page">
    <div class="section-label">Wildly important goal</div>
    <div id="wig-section"><div class="loading-msg">Loading…</div></div>
    <div id="countdown-section"></div>
    <div class="section-label" id="portfolio-label"></div>
    <div class="portfolio-row" id="portfolio-section"></div>
    <div class="section-label" id="regions-label"></div>
    <div class="regions-grid" id="regions-section"></div>
    <div class="section-label" id="leads-label"></div>
    <div class="leads-row" id="leads-section"></div>
    <div class="section-label" id="focus-label"></div>
    <div id="focus-investigate-section"></div>
    <div id="focus-working-section"></div>
    <div class="section-label" id="new-agents-label"></div>
    <div id="new-agents-section"></div>
    <div class="data-note" id="data-note"></div>
  </div>
</div>

<script>
// ---- AUTH ----
const PW_HASH = '37afc1f49bee96456c3da066936372f00ad403404c2167405605840ceaba9ec0';
if (sessionStorage.getItem('work_auth') === '1') {
  document.getElementById('pw-gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}
async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hash === PW_HASH) {
    sessionStorage.setItem('work_auth', '1');
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
window.checkPw = checkPw;
document.getElementById('pw-input').focus();

// ---- DATA ----
async function loadData() {
  try {
    const resp = await fetch('/work/mopo_scoreboard_data.json');
    if (!resp.ok) throw new Error('Data file not found (' + resp.status + ')');
    const data = await resp.json();
    renderAll(data);
  } catch (err) {
    document.getElementById('wig-section').innerHTML =
      '<div class="error-notice">Could not load scoreboard data. The daily refresh may not have run yet, or the data file is missing.<br><br>' + err.message + '</div>';
  }
}

// ---- HELPERS ----
function fmtDRR(v) { return v == null ? '—' : '$' + Number(v).toFixed(2); }
function fmtPct(v, dec=1) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + Number(v).toFixed(dec) + '%';
}
function fmtNGN(v) { return v == null ? '—' : '₦' + Number(v).toLocaleString('en-NG', {maximumFractionDigits:0}); }
function drrColor(v) { return v >= 0.18 ? 'green' : v >= 0.13 ? 'amber' : 'red'; }
function portColor(v) { return v >= 0.18 ? 'green' : v >= 0.14 ? 'amber' : 'red'; }
function weeksUntil(dateStr) {
  return Math.max(0, Math.ceil((new Date(dateStr) - new Date()) / (7*24*60*60*1000)));
}
function arcPath(drr) {
  const frac = Math.min(1, Math.max(0.002, (drr - 0.13) / 0.05));
  const angle = Math.PI * (1 - frac);
  return `M 20 100 A 80 80 0 0 1 ${(100 + 80*Math.cos(angle)).toFixed(1)} ${(100 - 80*Math.sin(angle)).toFixed(1)}`;
}
function fmtWindow(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  return d.getUTCDate() + ' ' + d.toLocaleDateString('en-GB', {month:'short', timeZone:'UTC'});
}

// ---- RENDER ----
function renderAll(data) {
  const genAt = data.generated_at ? new Date(data.generated_at) : new Date();
  const genStr = genAt.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
  const winEnd = data.window_end || '';
  const winStart = data.window_start || '';
  const winDisplay = winStart && winEnd ? fmtWindow(winStart) + '–' + fmtWindow(winEnd) + ' ' + new Date(winEnd+'T00:00:00Z').getUTCFullYear() : '—';

  document.getElementById('masthead-date').innerHTML = `<strong>${genStr}</strong><br>Data: ${winDisplay}`;
  renderWIG(data, winDisplay);
  renderPortfolios(data, winDisplay);
  renderRegions(data, winDisplay);
  renderLeads(data, winDisplay);
  renderFocusInvestigate(data, winDisplay);
  renderFocusWorking(data, winDisplay);
  renderNewAgents(data, winDisplay);
  document.getElementById('data-note').innerHTML =
    `DRR = rental income ÷ available batteries ÷ official NGN/USD rate (is_parallel_rate = 0) · Agent measures exclude &lt;14 days tenure · Floors: Apr 2026 P25 baseline<br>
    Data window: ${winDisplay} · Generated: ${genStr}`;
}

function renderWIG(data, winDisplay) {
  const curr = data.wig_current || 0;
  const prior = data.wig_prior || 0;
  const weeks = weeksUntil('2026-09-01');
  const wow = prior > 0 ? (curr - prior) / prior * 100 : 0;
  const gapNeeded = weeks > 0 ? (0.18 - curr) / curr / weeks * 100 : 0;
  const status = curr >= 0.18 ? 'ontarget' : curr >= 0.15 ? 'closing' : 'behind';
  const statusLabel = curr >= 0.18 ? 'On target' : curr >= 0.15 ? 'Closing in' : 'Behind target';
  const gapDollar = Math.max(0, 0.18 - curr).toFixed(2);
  const trajWeeks = wow > 0 ? Math.ceil(parseFloat(gapDollar) / (curr * wow / 100)) : '∞';

  document.getElementById('wig-section').innerHTML = `
    <div class="wig-panel">
      <div>
        <div class="wig-label">The WIG</div>
        <div class="wig-headline">Increase Nigeria MOPO50 DRR from <strong>$0.13</strong> to <strong>$0.18</strong> by <strong>1 September 2026</strong></div>
      </div>
      <div class="wig-arc-wrap">
        <svg class="arc-svg" viewBox="0 0 200 115" fill="none">
          <path d="M 20 100 A 80 80 0 0 1 180 100" stroke="rgba(245,240,232,0.12)" stroke-width="10" stroke-linecap="round" fill="none"/>
          <path d="${arcPath(curr)}" stroke="#C4622D" stroke-width="10" stroke-linecap="round" fill="none"/>
          <line x1="180" y1="100" x2="175" y2="86" stroke="#6B7C5C" stroke-width="2.5" stroke-linecap="round"/>
          <text x="16" y="114" fill="rgba(156,123,106,0.8)" font-size="9" font-family="Crimson Pro,serif">$0.13</text>
          <text x="162" y="114" fill="rgba(107,124,92,0.9)" font-size="9" font-family="Crimson Pro,serif">$0.18</text>
        </svg>
        <div class="arc-current-val">${fmtDRR(curr)}<span> / battery / day</span></div>
        <span class="arc-status ${status}">${statusLabel}</span>
      </div>
      <div class="wig-stats">
        <div class="wig-stat">
          <div class="wig-stat-val">${weeks} <span style="font-size:1rem;color:var(--ink-faint)">weeks</span></div>
          <div class="wig-stat-label">to deadline</div>
        </div>
        <div class="wig-stat">
          <div class="wig-stat-val ${wow >= 0 ? 'positive' : 'negative'}">${fmtPct(wow)} ${wow >= 0 ? '↑' : '↓'}</div>
          <div class="wig-stat-label">vs prior week</div>
        </div>
        <div class="wig-stat">
          <div class="wig-stat-val negative">${fmtPct(gapNeeded)} per week</div>
          <div class="wig-stat-label">needed to hit target</div>
        </div>
      </div>
    </div>`;

  document.getElementById('countdown-section').innerHTML = `
    <div class="countdown-strip">
      <div class="countdown-left">Gap to close: <strong>$${gapDollar}</strong> · at current trajectory that takes <strong>~${trajWeeks} weeks</strong></div>
      <div class="countdown-weeks">${weeks} <span>weeks remaining</span></div>
      <div class="weekly-needed">Need <strong>${fmtPct(gapNeeded)}</strong> per week to reach $0.18</div>
    </div>`;
}

function renderPortfolios(data, winDisplay) {
  document.getElementById('portfolio-label').textContent = `Portfolio split · ${winDisplay}`;
  document.getElementById('portfolio-section').innerHTML = (data.portfolios || []).map(p => {
    const c = portColor(p.drr_usd);
    const pct = Math.min(100, (p.drr_usd / 0.18 * 100)).toFixed(1);
    const isCBA = (p.name||'').toLowerCase().includes('cross');
    const label = isCBA ? 'CBA — CrossBoundary asset co' : 'MPNG — directly operated';
    const note = isCBA ? 'Reduced rev share' : 'Full rev share';
    const drag = isCBA && p.drr_usd < 0.15 ? `<span style="color:var(--terracotta)">Dragging NG average</span>` : '';
    return `<div class="portfolio-card ${c}">
      <div class="portfolio-name">${label} <span class="status-pip ${c}"></span></div>
      <div class="portfolio-drr ${c}">${fmtDRR(p.drr_usd)}</div>
      <div style="font-size:0.8rem;color:var(--ink-faint);margin-top:0.2rem">vs $0.18 target</div>
      <div class="progress-track"><div class="progress-fill ${c}" style="width:${pct}%"></div><div class="progress-target-marker"></div></div>
      <div class="progress-labels"><span>$0</span><span style="color:var(--sage)">$0.18</span></div>
      <div class="portfolio-meta" style="margin-top:0.75rem"><span>${p.hub_count} hubs</span><span>${note}</span>${drag}</div>
    </div>`;
  }).join('');
}

function renderRegions(data, winDisplay) {
  document.getElementById('regions-label').textContent = `Regions · ${winDisplay} · Nigeria MOPO50`;
  document.getElementById('regions-section').innerHTML = (data.regions || []).map(r => {
    const c = drrColor(r.drr_usd);
    const kudos = r.drr_usd >= 0.18 ? `<span class="kudos-badge">✦ on target</span>` : '';
    return `<div class="region-card ${c}">
      <div><div class="region-name">${r.region}${kudos}</div><div class="region-hubs">${r.hubs} hub${r.hubs!==1?'s':''}</div></div>
      <div class="region-drr ${c}">${fmtDRR(r.drr_usd)}</div>
    </div>`;
  }).join('');
}

function renderLeads(data, winDisplay) {
  document.getElementById('leads-label').textContent = `Lead measures · ${winDisplay} · agents with >14 days tenure`;
  const rel = data.lead_relative || {};
  const ear = data.lead_earnings || {};
  const relPct = rel.total_agents > 0 ? (rel.above_threshold / rel.total_agents * 100).toFixed(1) : 0;
  const earPct = ear.total_agents > 0 ? (ear.above_floor / ear.total_agents * 100).toFixed(1) : 0;
  document.getElementById('leads-section').innerHTML = `
    <div class="lead-card">
      <div class="lead-title">Relative agent performance</div>
      <div class="lead-subtitle">Agents above 35% of their hub's best this week</div>
      <div class="lead-gauge-wrap">
        <div class="lead-big-num">${relPct}%</div>
        <div class="lead-gauge-detail">
          <div class="lead-bar-track"><div class="lead-bar-fill" style="width:${relPct}%"></div></div>
          <div class="lead-counts"><span>${rel.above_threshold||0} healthy</span><span class="flagged">${rel.flagged_agents||0} flagged</span></div>
        </div>
      </div>
      <div style="font-size:0.78rem;color:var(--ink-faint);font-style:italic">${rel.flagged_agents||0} agents below 35% of hub best · ${rel.total_agents||0} observed · ${winDisplay}</div>
    </div>
    <div class="lead-card">
      <div class="lead-title">Agent earnings floor</div>
      <div class="lead-subtitle">Agents above their regional P25 floor this week</div>
      <div class="lead-gauge-wrap">
        <div class="lead-big-num">${earPct}%</div>
        <div class="lead-gauge-detail">
          <div class="lead-bar-track"><div class="lead-bar-fill" style="width:${earPct}%"></div></div>
          <div class="lead-counts"><span>${ear.above_floor||0} above floor</span><span class="flagged">${ear.below_floor||0} below floor</span></div>
        </div>
      </div>
      <div style="font-size:0.78rem;color:var(--ink-faint);font-style:italic">Floor is region-specific P25 (Apr 2026 baseline) · Ekiti ₦60,180 / Kano ₦3,840 per week</div>
    </div>`;
}

function renderFocusInvestigate(data, winDisplay) {
  document.getElementById('focus-label').textContent = `Focus list · where to point energy this week · ${winDisplay}`;
  const hubMap = {};
  (data.flagged_agents || []).forEach(a => {
    if (!hubMap[a.hub_name]) hubMap[a.hub_name] = {hub_name:a.hub_name, region:a.region, portfolio:a.portfolio, hub_drr:a.hub_drr, agents:[]};
    hubMap[a.hub_name].agents.push(a);
  });
  const hubs = Object.values(hubMap).sort((a,b) => b.agents.length - a.agents.length || a.hub_drr - b.hub_drr);
  const multi = hubs.filter(h => h.agents.length >= 2);
  const single = hubs.filter(h => h.agents.length < 2);
  const kiCount = single.filter(h => h.region==='Kano'||h.region==='Imo').length;
  const totalFlagged = (data.flagged_agents||[]).length;

  let rows = '';
  multi.forEach((hub, i) => {
    const drrColor = hub.hub_drr < 0.10 ? 'var(--terracotta)' : 'var(--amber)';
    rows += `<tr class="hub-row" id="hub-row-${i}" onclick="toggleDrill(${i})">
      <td style="font-weight:600">${hub.hub_name}<span class="expand-icon" id="ei-${i}">▶</span></td>
      <td style="color:var(--ink-light)">${hub.region}</td>
      <td style="color:var(--ink-faint)">${hub.portfolio}</td>
      <td style="text-align:center"><span class="badge red">${hub.agents.length}</span></td>
      <td style="text-align:right;font-family:'Playfair Display',serif;color:${drrColor};font-weight:700">${fmtDRR(hub.hub_drr)}</td>
      <td style="text-align:right"><span class="action-tag replace">Replace agents</span></td>
    </tr>
    <tr class="agent-detail" id="drill-${i}">
      <td colspan="6"><div class="agent-inner">
        <table class="agent-table">
          <thead><tr>
            <th style="width:22%">Agent</th><th style="width:11%;text-align:right">DRR</th>
            <th style="width:11%;text-align:right">Rel %</th><th style="width:18%;text-align:right">Wk Earnings</th>
            <th style="width:10%;text-align:right">Days</th><th style="width:14%;text-align:right">Action</th>
          </tr></thead>
          <tbody>${hub.agents.map(a => `<tr>
            <td style="font-weight:500">${a.agent_name}</td>
            <td style="text-align:right;font-family:'Playfair Display',serif;color:var(--terracotta)">${fmtDRR(a.agent_drr)}</td>
            <td style="text-align:right">${a.rel_perf}%</td>
            <td style="text-align:right">${fmtNGN(a.weekly_ngn)}</td>
            <td style="text-align:right">${a.days_in_role}</td>
            <td style="text-align:right"><span class="action-tag ${a.rel_perf < 20 ? 'replace' : 'monitor'}">${a.rel_perf < 20 ? 'Replace' : 'Monitor'}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div></td>
    </tr>`;
  });

  document.getElementById('focus-investigate-section').innerHTML = `
    <div class="focus-header investigate">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <div class="focus-dot investigate"></div>
        <div>
          <span class="focus-title investigate">${hubs.length} hubs flagged</span>
          <span style="font-size:0.82rem;color:var(--ink-light);margin-left:0.75rem">${totalFlagged} agents below both thresholds · tenure >14 days · ${winDisplay}</span>
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--terracotta);font-style:italic">Click a hub to see agents · sorted: flagged count, then DRR</div>
    </div>
    <div class="subsection-label">Priority · hubs with 2+ flagged agents</div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th style="width:26%">Hub</th><th style="width:18%">Region</th><th style="width:12%">Portfolio</th>
          <th style="width:12%;text-align:center">Flagged</th><th style="width:12%;text-align:right">Hub DRR</th>
          <th style="width:20%;text-align:right">Action</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${single.length > 0 ? `<div class="notice amber"><span class="notice-label">Note —</span>
      <span>A further ${single.length} single-agent hub${single.length!==1?'s are':' is'} flagged.${kiCount > 0 ? ` ${kiCount} are in <strong>Kano</strong> or <strong>Imo</strong> — regional market challenge, not individual agent failure. Investigate at regional level.` : ''}</span>
    </div>` : ''}`;
}

function toggleDrill(i) {
  const drill = document.getElementById(`drill-${i}`);
  const row = document.getElementById(`hub-row-${i}`);
  const icon = document.getElementById(`ei-${i}`);
  if (!drill) return;
  const open = drill.classList.contains('visible');
  drill.classList.toggle('visible', !open);
  if (row) row.classList.toggle('open', !open);
}
window.toggleDrill = toggleDrill;

function renderFocusWorking(data, winDisplay) {
  const topRegions = (data.regions||[]).filter(r => r.drr_usd >= 0.18);
  const mpng = (data.portfolios||[]).find(p => !(p.name||'').toLowerCase().includes('cross'));
  const wow = data.wig_prior > 0 ? (data.wig_current - data.wig_prior) / data.wig_prior * 100 : 0;
  let rows = topRegions.map(r =>
    `<tr><td style="font-weight:600">${r.region} region</td><td style="color:var(--ink-light)">${r.hubs} hubs · above $0.18 target</td>
    <td style="text-align:right;font-family:'Playfair Display',serif;color:var(--sage);font-weight:700">${fmtDRR(r.drr_usd)}</td>
    <td style="text-align:right"><span class="action-tag on-target">✦ On target</span></td></tr>`).join('');
  if (mpng) rows += `<tr><td style="font-weight:600">MPNG portfolio</td><td style="color:var(--ink-light)">${mpng.hub_count} hubs</td>
    <td style="text-align:right;font-family:'Playfair Display',serif;color:var(--sage);font-weight:700">${fmtDRR(mpng.drr_usd)}</td>
    <td style="text-align:right"><span class="action-tag on-target">Progressing</span></td></tr>`;
  rows += `<tr><td style="font-weight:600">Week on week</td><td style="color:var(--ink-light)">NG combined</td>
    <td style="text-align:right;font-family:'Playfair Display',serif;color:${wow>=0?'var(--sage)':'var(--terracotta)'};font-weight:700">${fmtPct(wow)}</td>
    <td style="text-align:right"><span class="action-tag ${wow>=0?'on-target':'monitor'}">${wow>=0?'Positive trend':'Watch'}</span></td></tr>`;

  document.getElementById('focus-working-section').innerHTML = `
    <div class="focus-header working" style="margin-top:0.75rem">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <div class="focus-dot working"></div>
        <span class="focus-title working">Working</span>
      </div>
      <div style="font-size:0.75rem;color:var(--sage)">regions hitting or exceeding target · ${winDisplay}</div>
    </div>
    <div class="table-wrap" style="margin-bottom:1.5rem">
      <table class="data-table">
        <thead><tr><th style="width:28%">What</th><th style="width:42%">Detail</th><th style="width:14%;text-align:right">Figure</th><th style="width:16%;text-align:right">Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderNewAgents(data, winDisplay) {
  const byRegion = (data.new_agents && data.new_agents.by_region) || [];
  const total = byRegion.reduce((s,r)=>s+r.new_agents,0);
  const aboveTarget = byRegion.reduce((s,r)=>s+r.above_target,0);
  const progressing = byRegion.reduce((s,r)=>s+r.progressing,0);
  const below = byRegion.reduce((s,r)=>s+r.below_baseline,0);
  const kano = byRegion.find(r=>r.region==='Kano');
  const imo = byRegion.find(r=>r.region==='Imo');
  const kiTotal = (kano?.new_agents||0) + (imo?.new_agents||0);

  document.getElementById('new-agents-label').textContent = `New agents · started past 30 days · 7–30 days in role · ${total} total · ${winDisplay}`;

  const tableRows = byRegion.map(r => {
    const c = r.avg_drr >= 0.18 ? 'var(--sage)' : r.avg_drr >= 0.13 ? 'var(--amber)' : 'var(--terracotta)';
    const isKI = r.region==='Kano'||r.region==='Imo';
    const tag = isKI ? '<span class="action-tag structural">Structural</span>'
      : r.avg_drr >= 0.13 ? '<span class="action-tag on-target">Watch</span>'
      : '<span class="action-tag monitor">Investigate</span>';
    return `<tr style="${isKI?'background:rgba(196,98,45,0.04)':''}">
      <td style="font-weight:${isKI?'700':'600'};color:${isKI?'var(--terracotta)':'inherit'}">${r.region}</td>
      <td style="text-align:center;${isKI?'font-weight:700':''}">${r.new_agents}</td>
      <td style="text-align:right;font-family:'Playfair Display',serif;color:${c};font-weight:700">${fmtDRR(r.avg_drr)}</td>
      <td style="text-align:center;color:var(--sage);font-weight:600">${r.above_target}</td>
      <td style="text-align:center;color:var(--amber);font-weight:600">${r.progressing}</td>
      <td style="text-align:center;color:var(--terracotta);font-weight:${isKI?'700':'600'}">${r.below_baseline}</td>
      <td style="text-align:right">${tag}</td>
    </tr>`;
  }).join('');

  document.getElementById('new-agents-section').innerHTML = `
    <div class="stat-cards">
      <div class="stat-card neutral"><div class="stat-card-label">Total new agents</div><div class="stat-card-val">${total}</div></div>
      <div class="stat-card good"><div class="stat-card-label">At or above $0.18</div><div class="stat-card-val">${aboveTarget}</div></div>
      <div class="stat-card warn"><div class="stat-card-label">$0.13 – $0.17</div><div class="stat-card-val">${progressing}</div></div>
      <div class="stat-card bad"><div class="stat-card-label">Below $0.13</div><div class="stat-card-val">${below}</div></div>
    </div>
    <div class="subsection-label">By region</div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th style="width:20%">Region</th><th style="width:10%;text-align:center">Agents</th>
          <th style="width:13%;text-align:right">Avg DRR</th><th style="width:13%;text-align:center;color:var(--sage)">≥$0.18</th>
          <th style="width:15%;text-align:center;color:var(--amber)">$0.13–$0.17</th>
          <th style="width:13%;text-align:center;color:var(--terracotta)">&lt;$0.13</th>
          <th style="width:16%;text-align:right">Status</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    ${kiTotal > 0 ? `<div class="notice amber"><span class="notice-label">Note —</span>
      <span>Kano (${kano?.new_agents||0} new agents) and Imo (${imo?.new_agents||0} new agents) account for ${kiTotal} of ${total} new agents this period, all below baseline. Market activation challenge — investigate at regional level.</span>
    </div>` : ''}`;
}
</script>
</body>
</html>
