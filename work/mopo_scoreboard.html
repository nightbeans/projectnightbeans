<script>
// ---- HELPERS ----
function fmtDRR(v) {
  if (v == null || isNaN(v)) return '—';
  return '$' + Number(v).toFixed(2);
}
function fmtPct(v, dec=1) {
  if (v == null || isNaN(v)) return '—';
  const s = Number(v).toFixed(dec);
  return (v >= 0 ? '+' : '') + s + '%';
}
function fmtNGN(v) {
  if (v == null) return '—';
  return '₦' + Number(v).toLocaleString('en-NG', {maximumFractionDigits:0});
}
function drrColor(v) {
  if (v >= 0.18) return 'green';
  if (v >= 0.13) return 'amber';
  return 'red';
}
function portfolioColor(v) {
  if (v >= 0.18) return 'green';
  if (v >= 0.14) return 'amber';
  return 'red';
}
function weeksUntil(dateStr) {
  const target = new Date(dateStr);
  const now = new Date();
  return Math.max(0, Math.ceil((target - now) / (7*24*60*60*1000)));
}
function getDateWindow() {
  const end = new Date(); end.setDate(end.getDate() - 1);
  const start = new Date(end); start.setDate(start.getDate() - 6);
  const fmt = d => d.getDate() + ' ' + d.toLocaleDateString('en-GB', {month:'short', year:'numeric'});
  const fmtS = d => d.getDate() + ' ' + d.toLocaleDateString('en-GB', {month:'short'});
  const today = new Date();
  const todayStr = fmt(today);
  const windowStr = fmtS(start) + '–' + fmt(end);
  return { start: fmtS(start), end: fmt(end), display: windowStr, today: todayStr, endDate: end };
}
function arcPath(drr) {
  const frac = Math.min(1, Math.max(0.002, (drr - 0.13) / 0.05));
  const angle = Math.PI * (1 - frac);
  const x = (100 + 80 * Math.cos(angle)).toFixed(1);
  const y = (100 - 80 * Math.sin(angle)).toFixed(1);
  return `M 20 100 A 80 80 0 0 1 ${x} ${y}`;
}
function progressPct(drr) {
  return Math.min(100, Math.max(0, (drr / 0.18) * 100)).toFixed(1);
}

// ---- AUTH ----
function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email = payload.email || '';
  const domain = email.split('@')[1] || '';
  if (!ALLOWED_DOMAINS.includes(domain)) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  sessionStorage.setItem('sb_user', JSON.stringify({name: payload.name, email}));
  document.getElementById('login-screen').style.display = 'none';
  startApp();
}
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('sb_user');
  if (saved) {
    document.getElementById('login-screen').style.display = 'none';
    startApp();
  }
});

// ---- DATA LOADING ----
function setStatus(msg, pct) {
  document.getElementById('loading-status').textContent = msg;
  document.getElementById('loading-bar').style.width = pct + '%';
}

async function fetchScoreboardData() {
  const dw = getDateWindow();
  const prompt = `You are a data analyst for MOPO, a battery rental company in Nigeria.

Run the following SQL queries using the execute_query tool. Return ONLY a single JSON object — no commentary, no markdown, just the raw JSON object.

QUERY 1 — WIG current week DRR (7-day rolling, Nigeria MOPO50, all owners):
SELECT ROUND(SUM(d.rental_income / NULLIF(crh.rate_usd,0)) / NULLIF(SUM(d.available),0), 4) AS drr_usd
FROM hub_performance_rollups_daily d
JOIN hubs h ON d.hub_id = h.hub_id
JOIN hub_business_policies bp ON h.hub_business_policy_id = bp.hub_business_policy_id
JOIN currencies cur ON bp.currency_code = cur.currency_code
JOIN currency_rates_history crh ON crh.currency_id = cur.id AND crh.date = d.date AND crh.is_parallel_rate = 0
WHERE h.is_test_hub = 0 AND h.product_type = 1 AND h.country_code = 'NG'
  AND h.hub_decommission_date IS NULL AND d.available > 0
  AND d.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 7 DAY) AND DATE_SUB(CURDATE(), INTERVAL 1 DAY)

QUERY 2 — WIG prior week DRR (replace INTERVAL 7 DAY with 14 DAY, and 1 DAY with 8 DAY):
Same query but: d.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 14 DAY) AND DATE_SUB(CURDATE(), INTERVAL 8 DAY)

QUERY 3 — Portfolio split (owner_id 2 = MPNG, owner_id 6 = CBA):
SELECT ow.name AS portfolio, COUNT(DISTINCT d.hub_id) AS hub_count,
  ROUND(SUM(d.rental_income / NULLIF(crh.rate_usd,0)) / NULLIF(SUM(d.available),0), 4) AS drr_usd
FROM hub_performance_rollups_daily d
JOIN hubs h ON d.hub_id = h.hub_id
JOIN companies ow ON h.owner_id = ow.id
JOIN hub_business_policies bp ON h.hub_business_policy_id = bp.hub_business_policy_id
JOIN currencies cur ON bp.currency_code = cur.currency_code
JOIN currency_rates_history crh ON crh.currency_id = cur.id AND crh.date = d.date AND crh.is_parallel_rate = 0
WHERE h.is_test_hub = 0 AND h.product_type = 1 AND h.country_code = 'NG'
  AND h.hub_decommission_date IS NULL AND ow.id IN (2,6) AND d.available > 0
  AND d.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 7 DAY) AND DATE_SUB(CURDATE(), INTERVAL 1 DAY)
GROUP BY ow.name, ow.id

QUERY 4 — Regions DRR:
SELECT r.name AS region,
  ROUND(SUM(d.rental_income / NULLIF(crh.rate_usd,0)) / NULLIF(SUM(d.available),0), 4) AS drr_usd,
  COUNT(DISTINCT d.hub_id) AS hubs
FROM hub_performance_rollups_daily d
JOIN hubs h ON d.hub_id = h.hub_id
JOIN region r ON h.region_id = r.id
JOIN hub_business_policies bp ON h.hub_business_policy_id = bp.hub_business_policy_id
JOIN currencies cur ON bp.currency_code = cur.currency_code
JOIN currency_rates_history crh ON crh.currency_id = cur.id AND crh.date = d.date AND crh.is_parallel_rate = 0
WHERE h.is_test_hub = 0 AND h.product_type = 1 AND h.country_code = 'NG'
  AND h.hub_decommission_date IS NULL AND d.available > 0
  AND d.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 7 DAY) AND DATE_SUB(CURDATE(), INTERVAL 1 DAY)
GROUP BY r.name ORDER BY drr_usd DESC

QUERY 5 — Lead measure: relative agent performance:
SELECT COUNT(DISTINCT CASE WHEN rel_perf >= 35 THEN agent_id END) AS above_threshold,
  COUNT(DISTINCT agent_id) AS total_agents,
  COUNT(DISTINCT CASE WHEN rel_perf < 35 THEN agent_id END) AS flagged_agents
FROM (
  SELECT aprd.agent_id, aprd.hub_id,
    ROUND(100 * SUM(aprd.rental_income) / NULLIF(MAX(SUM(aprd.rental_income)) OVER (PARTITION BY aprd.hub_id),0),1) AS rel_perf
  FROM agent_performance_rollups_daily aprd
  JOIN hubs h ON aprd.hub_id = h.hub_id
  JOIN agent_hub_assignment_history ahah ON ahah.agent_id = aprd.agent_id AND ahah.hub_id = aprd.hub_id
    AND DATEDIFF(aprd.date, ahah.created_at) > 14 AND ahah.deleted_at IS NULL
  WHERE h.country_code = 'NG' AND h.product_type = 1 AND h.is_test_hub = 0
    AND aprd.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 7 DAY) AND DATE_SUB(CURDATE(), INTERVAL 1 DAY)
    AND aprd.rental_income > 0
  GROUP BY aprd.agent_id, aprd.hub_id
) perf

QUERY 6 — Lead measure: agent earnings floor (regional P25):
SELECT COUNT(DISTINCT CASE WHEN weekly_ngn >= regional_p25 THEN agent_id END) AS above_floor,
  COUNT(DISTINCT agent_id) AS total_agents,
  COUNT(DISTINCT CASE WHEN weekly_ngn < regional_p25 THEN agent_id END) AS below_floor
FROM (
  SELECT aprd.agent_id, SUM(aprd.rental_income) AS weekly_ngn,
    CASE r.name WHEN 'Ekiti' THEN 60180 WHEN 'Ogun' THEN 60350 WHEN 'Osun' THEN 49500
      WHEN 'Ondo North' THEN 50000 WHEN 'Ondo South' THEN 37270 WHEN 'Bayelsa' THEN 36000
      WHEN 'Oyo' THEN 43500 WHEN 'Rivers' THEN 42000 WHEN 'Delta' THEN 27760
      WHEN 'Cross River' THEN 29000 WHEN 'Anambra' THEN 28000 WHEN 'Enugu' THEN 22500
      WHEN 'Ebonyi' THEN 9000 WHEN 'Kano' THEN 3840 WHEN 'Imo' THEN 1000 ELSE 25000 END AS regional_p25
  FROM agent_performance_rollups_daily aprd
  JOIN hubs h ON aprd.hub_id = h.hub_id
  JOIN region r ON h.region_id = r.id
  JOIN agent_hub_assignment_history ahah ON ahah.agent_id = aprd.agent_id AND ahah.hub_id = aprd.hub_id
    AND DATEDIFF(aprd.date, ahah.created_at) > 14 AND ahah.deleted_at IS NULL
  WHERE h.country_code = 'NG' AND h.product_type = 1 AND h.is_test_hub = 0
    AND aprd.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 7 DAY) AND DATE_SUB(CURDATE(), INTERVAL 1 DAY)
    AND aprd.rental_income > 0
  GROUP BY aprd.agent_id, r.name
) earnings

QUERY 7 — Agents failing BOTH thresholds (for focus list + drill-down). Get per-agent data with hub info and agent names:
SELECT a.name AS agent_name, h.name AS hub_name, r.name AS region,
  ow.name AS portfolio, perf.agent_id, perf.hub_id,
  ROUND(perf.agent_drr_usd, 4) AS agent_drr,
  perf.rel_perf, ROUND(perf.weekly_ngn) AS weekly_ngn,
  DATEDIFF(CURDATE(), ahah.created_at) AS days_in_role,
  ROUND(perf.hub_drr_usd, 4) AS hub_drr,
  CASE r.name WHEN 'Ekiti' THEN 60180 WHEN 'Ogun' THEN 60350 WHEN 'Osun' THEN 49500
    WHEN 'Ondo North' THEN 50000 WHEN 'Ondo South' THEN 37270 WHEN 'Bayelsa' THEN 36000
    WHEN 'Oyo' THEN 43500 WHEN 'Rivers' THEN 42000 WHEN 'Delta' THEN 27760
    WHEN 'Cross River' THEN 29000 WHEN 'Anambra' THEN 28000 WHEN 'Enugu' THEN 22500
    WHEN 'Ebonyi' THEN 9000 WHEN 'Kano' THEN 3840 WHEN 'Imo' THEN 1000 ELSE 25000 END AS regional_p25
FROM (
  SELECT aprd.agent_id, aprd.hub_id,
    SUM(aprd.rental_income / NULLIF(crh.rate_usd,0)) / NULLIF(SUM(aprd.available),0) AS agent_drr_usd,
    SUM(aprd.rental_income) AS weekly_ngn,
    ROUND(100 * SUM(aprd.rental_income) / NULLIF(MAX(SUM(aprd.rental_income)) OVER (PARTITION BY aprd.hub_id),0),1) AS rel_perf,
    SUM(SUM(aprd.rental_income / NULLIF(crh2.rate_usd,0))) OVER (PARTITION BY aprd.hub_id) / NULLIF(SUM(SUM(aprd.available)) OVER (PARTITION BY aprd.hub_id),0) AS hub_drr_usd
  FROM agent_performance_rollups_daily aprd
  JOIN hubs h ON aprd.hub_id = h.hub_id
  JOIN hub_business_policies bp ON h.hub_business_policy_id = bp.hub_business_policy_id
  JOIN currencies cur ON bp.currency_code = cur.currency_code
  JOIN currency_rates_history crh ON crh.currency_id = cur.id AND crh.date = aprd.date AND crh.is_parallel_rate = 0
  JOIN currency_rates_history crh2 ON crh2.currency_id = cur.id AND crh2.date = aprd.date AND crh2.is_parallel_rate = 0
  JOIN agent_hub_assignment_history ahah2 ON ahah2.agent_id = aprd.agent_id AND ahah2.hub_id = aprd.hub_id
    AND DATEDIFF(aprd.date, ahah2.created_at) > 14 AND ahah2.deleted_at IS NULL
  WHERE h.country_code = 'NG' AND h.product_type = 1 AND h.is_test_hub = 0
    AND aprd.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 7 DAY) AND DATE_SUB(CURDATE(), INTERVAL 1 DAY)
    AND aprd.rental_income > 0
  GROUP BY aprd.agent_id, aprd.hub_id
) perf
JOIN agents a ON a.id = perf.agent_id
JOIN hubs h ON h.hub_id = perf.hub_id
JOIN region r ON h.region_id = r.id
JOIN companies ow ON h.owner_id = ow.id
JOIN agent_hub_assignment_history ahah ON ahah.agent_id = perf.agent_id AND ahah.hub_id = perf.hub_id AND ahah.deleted_at IS NULL
WHERE perf.rel_perf < 35
  AND perf.weekly_ngn < CASE r.name WHEN 'Ekiti' THEN 60180 WHEN 'Ogun' THEN 60350 WHEN 'Osun' THEN 49500
    WHEN 'Ondo North' THEN 50000 WHEN 'Ondo South' THEN 37270 WHEN 'Bayelsa' THEN 36000
    WHEN 'Oyo' THEN 43500 WHEN 'Rivers' THEN 42000 WHEN 'Delta' THEN 27760
    WHEN 'Cross River' THEN 29000 WHEN 'Anambra' THEN 28000 WHEN 'Enugu' THEN 22500
    WHEN 'Ebonyi' THEN 9000 WHEN 'Kano' THEN 3840 WHEN 'Imo' THEN 1000 ELSE 25000 END
ORDER BY hub_name, perf.rel_perf ASC

QUERY 8 — New agent tracker (7–30 days in role, started past 30 days):
SELECT r.name AS region, COUNT(DISTINCT ahah.agent_id) AS new_agents,
  ROUND(AVG(aprd_summary.agent_drr),4) AS avg_drr,
  SUM(CASE WHEN aprd_summary.agent_drr >= 0.18 THEN 1 ELSE 0 END) AS above_target,
  SUM(CASE WHEN aprd_summary.agent_drr >= 0.13 AND aprd_summary.agent_drr < 0.18 THEN 1 ELSE 0 END) AS progressing,
  SUM(CASE WHEN aprd_summary.agent_drr < 0.13 THEN 1 ELSE 0 END) AS below_baseline
FROM agent_hub_assignment_history ahah
JOIN hubs h ON h.hub_id = ahah.hub_id
JOIN region r ON h.region_id = r.id
JOIN (
  SELECT aprd.agent_id, aprd.hub_id,
    SUM(aprd.rental_income / NULLIF(crh.rate_usd,0)) / NULLIF(SUM(aprd.available),0) AS agent_drr
  FROM agent_performance_rollups_daily aprd
  JOIN hubs h2 ON aprd.hub_id = h2.hub_id
  JOIN hub_business_policies bp ON h2.hub_business_policy_id = bp.hub_business_policy_id
  JOIN currencies cur ON bp.currency_code = cur.currency_code
  JOIN currency_rates_history crh ON crh.currency_id = cur.id AND crh.date = aprd.date AND crh.is_parallel_rate = 0
  WHERE h2.country_code = 'NG' AND h2.product_type = 1 AND h2.is_test_hub = 0
    AND aprd.date BETWEEN DATE_SUB(CURDATE(), INTERVAL 30 DAY) AND DATE_SUB(CURDATE(), INTERVAL 1 DAY)
  GROUP BY aprd.agent_id, aprd.hub_id
) aprd_summary ON aprd_summary.agent_id = ahah.agent_id AND aprd_summary.hub_id = ahah.hub_id
WHERE h.country_code = 'NG' AND h.product_type = 1 AND h.is_test_hub = 0
  AND ahah.created_at >= DATE_SUB(CURDATE(), INTERVAL 30 DAY) AND ahah.deleted_at IS NULL
  AND DATEDIFF(CURDATE(), ahah.created_at) BETWEEN 7 AND 30
GROUP BY r.name ORDER BY new_agents DESC

Return this exact JSON structure (fill with real query results):
{
  "wig_current": <number from Q1>,

    ...

  "new_agents": {
    "by_region": [{"region":"...","new_agents":N,"avg_drr":N,"above_target":N,"progressing":N,"below_baseline":N}, ...]
  }
}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',

      'anthropic-version': '2023-06-01',

    },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: 16000,
      tools: [{
        type: 'mcp',
        server: { type: 'url', url: DATABOT_MCP_URL, name: 'databot' }
      }],
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!resp.ok) throw new Error('Anthropic API error: ' + resp.status);
  const result = await resp.json();
  const textBlock = (result.content || []).filter(b => b.type === 'text').pop();
  if (!textBlock) throw new Error('No text response from Claude');
  const match = textBlock.text.match(/\{[\s\S]*\}/);

// ---- RENDER FUNCTIONS ----
function renderWIG(data, dw) {
  const curr = data.wig_current || 0;
  const prior = data.wig_prior || 0;
  const weeks = weeksUntil('2026-09-01');
  const wowPct = prior > 0 ? ((curr - prior) / prior * 100) : 0;
  const gapNeededPerWeek = weeks > 0 ? ((0.18 - curr) / curr / weeks * 100) : 0;
  const status = curr >= 0.18 ? 'ontarget' : curr >= 0.15 ? 'closing' : 'behind';
  const statusLabel = curr >= 0.18 ? 'On target' : curr >= 0.15 ? 'Closing in' : 'Behind target';
  const wowClass = wowPct >= 0 ? 'positive' : 'negative';

  document.getElementById('wig-section').innerHTML = `
    <div class="wig-panel">
      <div>
        <div class="wig-label">The WIG</div>
        <div class="wig-headline">Increase Nigeria MOPO50 DRR from <strong>$0.13</strong> to <strong>$0.18</strong> by <strong>1 September 2026</strong></div>
      </div>
      <div class="wig-arc-wrap">
        <svg class="arc-svg" viewBox="0 0 200 115" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 20 100 A 80 80 0 0 1 180 100" stroke="rgba(245,240,232,0.12)" stroke-width="10" stroke-linecap="round" fill="none"/>
          <path d="${arcPath(curr)}" stroke="#C4622D" stroke-width="10" stroke-linecap="round" fill="none"/>
          <line x1="180" y1="100" x2="175" y2="86" stroke="#6B7C5C" stroke-width="2.5" stroke-linecap="round"/>
          <text x="16" y="114" fill="rgba(156,123,106,0.8)" font-size="9" font-family="Crimson Pro, serif">$0.13</text>
          <text x="162" y="114" fill="rgba(107,124,92,0.9)" font-size="9" font-family="Crimson Pro, serif">$0.18</text>
        </svg>
        <div class="arc-current-val">${fmtDRR(curr)}<span> / battery / day</span></div>
        <span class="arc-status ${status}">${statusLabel}</span>
      </div>
      <div class="wig-stats">
        <div class="wig-stat">
          <div class="wig-stat-val">${weeks} <span style="font-size:1rem;color:var(--ink-faint);">weeks</span></div>
          <div class="wig-stat-label">to deadline</div>
        </div>
        <div class="wig-stat">
          <div class="wig-stat-val ${wowClass}">${fmtPct(wowPct)} ${wowPct >= 0 ? '↑' : '↓'}</div>
          <div class="wig-stat-label">vs prior week</div>
        </div>
        <div class="wig-stat">
          <div class="wig-stat-val negative">${fmtPct(gapNeededPerWeek)} per week</div>
          <div class="wig-stat-label">needed to hit target</div>
        </div>
      </div>
    </div>`;

  const gapDollar = (0.18 - curr).toFixed(2);
  const trajWeeks = wowPct > 0 ? Math.ceil(gapDollar / (curr * wowPct / 100)) : '∞';
  document.getElementById('countdown-section').innerHTML = `
    <div class="countdown-strip">
      <div class="countdown-left">Gap to close: <strong>$${gapDollar}</strong> · at current trajectory that takes <strong>~${trajWeeks} weeks</strong></div>
      <div class="countdown-weeks">${weeks} <span>weeks remaining</span></div>
      <div class="weekly-needed">Need <strong>${fmtPct(gapNeededPerWeek)}</strong> per week to reach $0.18</div>
    </div>`;
}

function renderPortfolios(data, dw) {
  document.getElementById('portfolio-label').textContent = `Portfolio split · ${dw.display}`;
  const html = data.portfolios.map(p => {
    const c = portfolioColor(p.drr_usd);
    const pct = progressPct(p.drr_usd);
    const isCBA = p.name.toLowerCase().includes('crossboundary') || p.name.toLowerCase().includes('cba');
    const label = isCBA ? 'CBA — CrossBoundary asset co' : 'MPNG — directly operated';
    const revNote = isCBA ? 'Reduced rev share' : 'Full rev share';
    const drag = isCBA && p.drr_usd < 0.15 ? `<span style="color:var(--terracotta);">Dragging NG average</span>` : '';
    return `<div class="portfolio-card ${c}">
      <div class="portfolio-name">${label} <span class="status-pip ${c}"></span></div>
      <div class="portfolio-drr ${c}">${fmtDRR(p.drr_usd)}</div>
      <div style="font-size:0.8rem;color:var(--ink-faint);margin-top:0.2rem;">vs $0.18 target</div>
      <div class="progress-track">
        <div class="progress-fill ${c}" style="width:${pct}%"></div>
        <div class="progress-target-marker"></div>
      </div>
      <div class="progress-labels"><span>$0</span><span style="color:var(--sage);">$0.18</span></div>
      <div class="portfolio-meta" style="margin-top:0.75rem;"><span>${p.hub_count} hubs</span><span>${revNote}</span>${drag}</div>
    </div>`;
  }).join('');
  document.getElementById('portfolio-section').innerHTML = html;
}

        <div class="focus-dot investigate"></div>
        <div>
          <span class="focus-title investigate">${hubs.length} hubs flagged</span>
          <span style="font-size:0.82rem;color:var(--ink-light);margin-left:0.75rem;">${totalFlagged} agents below both thresholds · tenure >14 days · ${dw.display}</span>
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--terracotta);font-style:italic;">Click a hub row to see agents · sorted: flagged agents, then DRR</div>
    </div>
    <div class="subsection-label">Priority · hubs with multiple flagged agents</div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th style="width:26%;">Hub</th>
          <th style="width:18%;">Region</th>
          <th style="width:12%;">Portfolio</th>
          <th style="width:12%;text-align:center;">Flagged</th>
          <th style="width:12%;text-align:right;">Hub DRR</th>
          <th style="width:20%;text-align:right;">Action</th>
        </tr></thead>
        ${tbody}
      </table>
    </div>
    <div class="notice amber">
      <span class="notice-label">Note —</span>
      <span>A further ${otherSingle.length + kanoImo.length} single-agent hubs are flagged. ${kanoImo.length > 0 ? `The majority are in <strong>Kano</strong> and <strong>Imo</strong>, where low DRR reflects a regional market challenge, not individual agent failure. Treat those regions as structural issues — hub-by-hub agent replacements won't solve this.` : ''}</span>
    </div>`;
}

function toggleDrill(i) {
  const row = document.getElementById(`drill-${i}`);
  const icon = document.getElementById(`expand-${i}`);
  const hubRow = icon && icon.closest('tr');
  if (!row) return;
  const open = row.classList.contains('visible');
  row.classList.toggle('visible', !open);
  if (hubRow) hubRow.classList.toggle('open', !open);
}
window.toggleDrill = toggleDrill;

function renderFocusWorking(data, dw) {
  const topRegions = (data.regions || []).filter(r => r.drr_usd >= 0.18);
  const mpng = (data.portfolios || []).find(p => !p.name.toLowerCase().includes('crossboundary') && !p.name.toLowerCase().includes('cba'));
  const wow = data.wig_prior > 0 ? ((data.wig_current - data.wig_prior) / data.wig_prior * 100) : 0;
  let rows = '';
  topRegions.forEach(r => {
    rows += `<tr><td style="font-weight:600;">${r.region} region</td><td style="color:var(--ink-light);">${r.hubs} hubs · above $0.18 target</td><td style="text-align:right;font-family:'Playfair Display',serif;color:var(--sage);font-weight:700;">${fmtDRR(r.drr_usd)}</td><td style="text-align:right;"><span class="action-tag on-target">✦ On target</span></td></tr>`;
  });
  if (mpng) {
    rows += `<tr><td style="font-weight:600;">MPNG portfolio</td><td style="color:var(--ink-light);">${mpng.hub_count} hubs · closing gap on target</td><td style="text-align:right;font-family:'Playfair Display',serif;color:var(--sage);font-weight:700;">${fmtDRR(mpng.drr_usd)}</td><td style="text-align:right;"><span class="action-tag on-target">Progressing</span></td></tr>`;
  }
  rows += `<tr><td style="font-weight:600;">Week on week</td><td style="color:var(--ink-light);">NG combined · ${wow >= 0 ? 'positive' : 'negative'} direction</td><td style="text-align:right;font-family:'Playfair Display',serif;color:${wow >= 0 ? 'var(--sage)' : 'var(--terracotta)'};font-weight:700;">${fmtPct(wow)}</td><td style="text-align:right;"><span class="action-tag ${wow >= 0 ? 'on-target' : 'monitor'}">${wow >= 0 ? 'Positive trend' : 'Watch'}</span></td></tr>`;

  document.getElementById('focus-working-section').innerHTML = `
    <div class="focus-header working" style="margin-top:0.75rem;">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div class="focus-dot working"></div>
        <span class="focus-title working">Working</span>
      </div>
      <div style="font-size:0.75rem;color:var(--sage);">regions hitting or exceeding target · ${dw.display}</div>
    </div>
    <div class="table-wrap" style="margin-bottom:1.5rem;">
      <table class="data-table">
        <thead><tr>
          <th style="width:28%;">What</th>
          <th style="width:42%;">Detail</th>
          <th style="width:14%;text-align:right;">Figure</th>
          <th style="width:16%;text-align:right;">Status</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderNewAgents(data, dw) {
  const byRegion = (data.new_agents && data.new_agents.by_region) || [];
  const total = byRegion.reduce((s,r) => s + r.new_agents, 0);
  const aboveTarget = byRegion.reduce((s,r) => s + r.above_target, 0);
  const progressing = byRegion.reduce((s,r) => s + r.progressing, 0);
  const below = byRegion.reduce((s,r) => s + r.below_baseline, 0);

  document.getElementById('new-agents-label').textContent = `New agents · started past 30 days · 7–30 days in role · ${total} total · data from ${dw.display}`;

  const tableRows = byRegion.map(r => {
    const c = r.avg_drr >= 0.18 ? 'var(--sage)' : r.avg_drr >= 0.13 ? 'var(--amber)' : 'var(--terracotta)';
    const isStructural = r.region === 'Kano' || r.region === 'Imo';
    const tag = isStructural ? '<span class="action-tag structural">Structural</span>'
      : r.avg_drr >= 0.13 ? '<span class="action-tag on-target">Watch</span>'
      : '<span class="action-tag monitor">Investigate</span>';
    const rowStyle = isStructural ? 'background:rgba(196,98,45,0.04);' : '';
    const nameStyle = isStructural ? 'font-weight:700;color:var(--terracotta);' : 'font-weight:600;';
    return `<tr style="${rowStyle}">
      <td style="${nameStyle}">${r.region}</td>
      <td style="text-align:center;${isStructural ? 'font-weight:700;' : ''}">${r.new_agents}</td>
      <td style="text-align:right;font-family:'Playfair Display',serif;color:${c};font-weight:700;">${fmtDRR(r.avg_drr)}</td>
      <td style="text-align:center;color:var(--sage);font-weight:600;">${r.above_target}</td>
      <td style="text-align:center;color:var(--amber);font-weight:600;">${r.progressing}</td>
      <td style="text-align:center;color:var(--terracotta);${isStructural ? 'font-weight:700;' : 'font-weight:600;'}">${r.below_baseline}</td>
      <td style="text-align:right;">${tag}</td>
    </tr>`;
  }).join('');

  const kanoImoTotal = byRegion.filter(r => r.region==='Kano'||r.region==='Imo').reduce((s,r)=>s+r.new_agents,0);
  const kanoCount = byRegion.find(r=>r.region==='Kano')?.new_agents || 0;
  const imoCount = byRegion.find(r=>r.region==='Imo')?.new_agents || 0;

  document.getElementById('new-agents-section').innerHTML = `
    <div class="stat-cards">
      <div class="stat-card neutral"><div class="stat-card-label">Total new agents</div><div class="stat-card-val">${total}</div></div>
      <div class="stat-card good"><div class="stat-card-label">At or above $0.18</div><div class="stat-card-val">${aboveTarget}</div></div>
      <div class="stat-card warn"><div class="stat-card-label">$0.13 – $0.17</div><div class="stat-card-val">${progressing}</div></div>
      <div class="stat-card bad"><div class="stat-card-label">Below $0.13</div><div class="stat-card-val">${below}</div></div>
    </div>
    <div class="subsection-label">By region</div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th style="width:20%;">Region</th>
          <th style="width:10%;text-align:center;">Agents</th>
          <th style="width:13%;text-align:right;">Avg DRR</th>
          <th style="width:13%;text-align:center;color:var(--sage);">≥$0.18</th>
          <th style="width:15%;text-align:center;color:var(--amber);">$0.13–$0.17</th>
          <th style="width:13%;text-align:center;color:var(--terracotta);">&lt;$0.13</th>
          <th style="width:16%;text-align:right;">Status</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    ${kanoImoTotal > 0 ? `<div class="notice amber"><span class="notice-label">Note —</span><span>Kano (${kanoCount} new agents) and Imo (${imoCount} new agents) account for ${kanoImoTotal} of ${total} new agents this period, all below baseline. This is a market activation challenge, not an agent quality issue. Investigate at regional level.</span></div>` : ''}`;
}

function renderAll(data) {
  const dw = getDateWindow();
  document.getElementById('masthead-date').innerHTML = `<strong>${dw.today}</strong><br>Data: ${dw.display}`;
  renderWIG(data, dw);
  renderPortfolios(data, dw);
  renderRegions(data, dw);
  renderLeads(data, dw);
  renderFocusInvestigate(data, dw);
  renderFocusWorking(data, dw);
  renderNewAgents(data, dw);
  const endDate = dw.endDate;
  const startDate = new Date(endDate); startDate.setDate(startDate.getDate() - 6);
  const fmtFull = d => d.getDate() + ' ' + d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  document.getElementById('data-note').innerHTML = `
    All figures drawn from platform database · DRR = rental income ÷ available batteries ÷ official NGN/USD exchange rate (is_parallel_rate = 0)<br>
    Agent lead measures exclude agents with &lt;14 days tenure · Regional earnings floors: April 2026 P25 baseline · Focus list: agents below both thresholds simultaneously<br>
    Data window: ${fmtFull(startDate)} – ${fmtFull(endDate)} · Generated: ${dw.today}`;
}

// ---- INIT ----
async function startApp() {
  document.getElementById('loading-screen').style.display = 'flex';
  try {
    setStatus('Connecting to Databot…', 15);
    await new Promise(r => setTimeout(r, 400));
    setStatus('Running portfolio and region queries…', 35);
    await new Promise(r => setTimeout(r, 400));
    setStatus('Computing lead measures…', 55);
    const data = await fetchScoreboardData();
    setStatus('Populating scoreboard…', 80);
    await new Promise(r => setTimeout(r, 300));
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll(data);
  } catch (err) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const dw = getDateWindow();
    document.getElementById('masthead-date').innerHTML = `<strong>${dw.today}</strong><br>Data unavailable`;
    ['wig-section','countdown-section','portfolio-section','regions-section','leads-section','focus-investigate-section','focus-working-section','new-agents-section'].forEach(id => {
      document.getElementById(id).innerHTML = `<div class="error-notice">Data unavailable — check Databot connection and API key. Error: ${err.message}</div>`;
    });
    console.error('Scoreboard load error:', err);
  }
}
</script>
</body>
</html>
