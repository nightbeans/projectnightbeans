const GENERATED_AT = '2026-04-23T06:00:00Z';
// ---- DATA END ----

const BASELINES = {'Ibiade Ogun':118,'Iwopin Ogun':107,'Kajola Ondo':93,'Oba Akoko Ondo':152,'Sobe Edo':113,'Ute Ondo':204};
const STATE_LABELS = {'Ibiade Ogun':'Ogun','Iwopin Ogun':'Ogun','Kajola Ondo':'Ondo','Oba Akoko Ondo':'Ondo','Sobe Edo':'Edo','Ute Ondo':'Ondo'};
const TRIAL_START = '2026-04-22';
const HUB_ORDER = ['Ibiade Ogun','Iwopin Ogun','Kajola Ondo','Oba Akoko Ondo','Sobe Edo','Ute Ondo'];

// ---- SSO ----
function handleGoogleSignIn(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const domain = (payload.email || '').split('@')[1] || '';
  if (!ALLOWED_DOMAINS.includes(domain)) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  buildDashboard();
}
function signOut() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  if (window.google && google.accounts) google.accounts.id.disableAutoSelect();
}

// ---- BUILD ----
function buildDashboard() {
  const ts = new Date(GENERATED_AT);
  document.getElementById('generated-at').textContent =
    'data as of ' + ts.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'UTC'}) + ' UTC';

  // group by hub
  const byHub = {};
  for (const r of RAW_DATA) {
    if (!byHub[r.hub_name]) byHub[r.hub_name] = [];
    byHub[r.hub_name].push(r);
  }

  const grid = document.getElementById('hub-grid');
  grid.innerHTML = '';

  for (const hub of HUB_ORDER) {
    const rows = (byHub[hub] || []).sort((a,b) => a.date.localeCompare(b.date));
    const baseline = BASELINES[hub];
    const preRows = rows.filter(r => r.date < TRIAL_START);
    const trialRows = rows.filter(r => r.date >= TRIAL_START);
    const lastRow = rows[rows.length - 1];

    const drr = r => r.inc / r.av;
    const avg = arr => arr.length ? arr.reduce((s,r) => s + drr(r), 0) / arr.length : null;

    const ydDrr = drr(lastRow);
    const trialAvg = avg(trialRows);
    const preAvg = avg(preRows);
    const deltaBaseline = trialAvg != null ? (trialAvg - baseline) / baseline : null;
    const yd24share = lastRow.rt > 0 ? lastRow.r24 / lastRow.rt : null;

    // badge
    let badgeCls = 'badge-ne', badgeTxt = '—';
    if (deltaBaseline != null) {
      const pct = Math.round(deltaBaseline * 100);
      badgeTxt = (pct >= 0 ? '+' : '') + pct + '%';
      badgeCls = pct >= -10 ? 'badge-up' : pct >= -30 ? 'badge-ne' : 'badge-dn';
    }

    // alerts
    const alerts = [];
    if (yd24share != null && yd24share < 0.75) alerts.push('24hr share yesterday ' + Math.round(yd24share*100) + '% — below 75%');
    if (trialRows.length >= 2) {
      const prevDrr = drr(trialRows[trialRows.length - 2]);
      if (Math.abs(ydDrr - prevDrr) / prevDrr > 0.20) {
        const swing = Math.round((ydDrr - prevDrr) / prevDrr * 100);
        alerts.push('DRR swung ' + (swing >= 0 ? '+' : '') + swing + '% day-on-day');
      }
    }

    const fmt = v => v != null ? '₦' + v.toFixed(0) : '—';
    const fmtPct = v => v != null ? (v >= 0 ? '+' : '') + Math.round(v*100) + '%' : '—';
    const deltaCls = deltaBaseline == null ? '' : deltaBaseline >= -0.1 ? 'up' : deltaBaseline >= -0.3 ? 'am' : 'dn';

    const card = document.createElement('div');
    card.className = 'hub-card';
    card.innerHTML = `
      <div class="card-head">
        <div>
          <div class="card-hub">${hub}</div>
          <div class="card-state">${STATE_LABELS[hub]} · hub ${rows[0].hub_id}</div>
        </div>
        <div class="badge ${badgeCls}">${badgeTxt} vs baseline</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-lbl">Yesterday DRR</div><div class="stat-val">${fmt(ydDrr)}</div></div>
        <div class="stat"><div class="stat-lbl">Trial Avg</div><div class="stat-val">${fmt(trialAvg)}</div></div>
        <div class="stat"><div class="stat-lbl">Pre-ASP Avg</div><div class="stat-val">${fmt(preAvg)}</div></div>
        <div class="stat"><div class="stat-lbl">Baseline</div><div class="stat-val">₦${baseline}</div></div>
        <div class="stat"><div class="stat-lbl">Δ vs Baseline</div><div class="stat-val ${deltaCls}">${fmtPct(deltaBaseline)}</div></div>
      </div>
      <div class="charts-row">
        <div class="chart-pane">
          <div class="chart-lbl">DRR ₦ / battery · dotted = baseline · shaded = trial period</div>
          <canvas id="drr-${hub.replace(/\s/g,'_')}" height="130"></canvas>
        </div>
        <div class="chart-pane">
          <div class="chart-lbl">Rental mix by duration</div>
          <canvas id="mix-${hub.replace(/\s/g,'_')}" height="130"></canvas>
        </div>
      </div>
      ${alerts.length ? `<div class="alert-bar" style="display:block">⚠ ${alerts.join(' · ')}</div>` : ''}
    `;
    grid.appendChild(card);

    // charts
    const dates = rows.map(r => r.date.slice(5)); // MM-DD
    const drrVals = rows.map(r => +drr(r).toFixed(2));
    const trialIdx = rows.findIndex(r => r.date >= TRIAL_START);

    // DRR line chart
    const drrCtx = document.getElementById('drr-' + hub.replace(/\s/g,'_')).getContext('2d');
    new Chart(drrCtx, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [{
          data: drrVals,
          borderColor: '#2c2b20',
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 3,
          tension: 0.3,
          fill: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => '₦' + ctx.parsed.y.toFixed(1)
            }
          },
          annotation: {
            annotations: {
              baseline: {
                type: 'line',
                yMin: baseline, yMax: baseline,
                borderColor: 'rgba(100,100,80,0.5)',
                borderWidth: 1,
                borderDash: [4,4],
                label: { content: 'baseline ₦'+baseline, display: true, position: 'end', font: {size:9,family:'JetBrains Mono'}, color: 'rgba(100,100,80,0.7)', backgroundColor: 'transparent', yAdjust: -8 }
              },
              ...(trialIdx >= 0 ? {
                trialBox: {
                  type: 'box',
                  xMin: trialIdx - 0.5,
                  backgroundColor: 'rgba(180,160,100,0.07)',
                  borderWidth: 0
                },
                trialLine: {
                  type: 'line',
                  xMin: trialIdx - 0.5, xMax: trialIdx - 0.5,
                  borderColor: 'rgba(100,80,40,0.3)',
                  borderWidth: 1,
                  borderDash: [3,3],
                  label: { content: 'ASP 600', display: true, position: 'start', font: {size:9,family:'JetBrains Mono'}, color: 'rgba(100,80,40,0.5)', backgroundColor: 'transparent', xAdjust: 4 }
                }
              } : {})
            }
          }
        },
        scales: {
          x: { ticks: { font: {size:9,family:'JetBrains Mono'}, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { display: false }, border: { color: 'rgba(0,0,0,0.1)' } },
          y: { ticks: { font: {size:9,family:'JetBrains Mono'}, callback: v => '₦'+v }, grid: { color: 'rgba(0,0,0,0.05)' }, border: { display: false }, beginAtZero: true }
        }
      }
    });

    // Rental mix stacked bar
    const mixCtx = document.getElementById('mix-' + hub.replace(/\s/g,'_')).getContext('2d');
    new Chart(mixCtx, {
      type: 'bar',
      data: {
        labels: dates,
        datasets: [
          { label: '24hr', data: rows.map(r => r.r24), backgroundColor: '#3d3b2e', stack: 'mix' },
          { label: '12hr', data: rows.map(r => r.r12), backgroundColor: '#8a856e', stack: 'mix' },
          { label: '6hr',  data: rows.map(r => r.r6),  backgroundColor: '#c8c4b0', stack: 'mix' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'bottom', labels: { font: {size:9}, boxWidth: 10, padding: 8 } },
          tooltip: { mode: 'index' }
        },
        scales: {
          x: { stacked: true, ticks: { font: {size:9,family:'JetBrains Mono'}, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 }, grid: { display: false }, border: { color: 'rgba(0,0,0,0.1)' } },
          y: { stacked: true, ticks: { font: {size:9,family:'JetBrains Mono'} }, grid: { color: 'rgba(0,0,0,0.05)' }, border: { display: false }, beginAtZero: true }
        }
      }
    });
  }
}
</script>
