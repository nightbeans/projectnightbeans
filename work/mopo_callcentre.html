<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">MOPO</div>
    <div class="login-sub">Call Centre — sign in to continue</div>
    <div id="g_id_onload"
      data-client_id="709784373150-q5budplonk1uggjvr9kq2pqggf205mq4.apps.googleusercontent.com"
      data-callback="handleGoogleSignIn"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-shape="rectangular"
      data-logo_alignment="left">
    </div>
    <div id="login-error">Only MOPO Google accounts can access this tool.</div>
  </div>
</div>

<div id="loading-screen">
  <div class="spinner"></div>
  <p id="loading-msg">Loading...</p>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">MOPO Call Centre</div>
    <div class="tab active" onclick="switchTab('today',this)">Today</div>
    <div class="tab" onclick="switchTab('pipeline',this)">Pipeline</div>
    <div class="tab" onclick="switchTab('all',this)">All contacts</div>
    <div class="tab" onclick="switchTab('reps',this)">Reps</div>
    <div id="user-pill">
      <div class="user-avatar" id="user-avatar"></div>
      <span class="user-name" id="user-name-display"></span>
      <button class="sign-out" onclick="signOut()">Sign out</button>
    </div>
    <div style="margin-left:12px;display:flex;gap:8px">
      <label class="btn btn-ghost" style="font-size:13px;padding:6px 14px;cursor:pointer">
        Upload leads
        <input type="file" accept=".csv" style="display:none" onchange="importCSV(event)">
      </label>
      <button class="btn btn-ghost" style="font-size:13px;padding:6px 14px" onclick="openNew()">+ New contact</button>
    </div>
  </div>
  <div class="metrics" id="metrics"></div>
  <div id="view-today" class="today-outer"></div>
  <div id="view-pipeline" class="pipeline-wrap" style="display:none"></div>
  <div id="view-all" class="view" style="display:none"></div>
  <div id="view-reps" class="reps-wrap" style="display:none"></div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="drawer">
    <div class="d-hdr">
      <h2 id="d-title">Contact</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="save-indicator" id="save-indicator"></span>
        <button class="close-btn" onclick="closeDrawer()">×</button>
      </div>
    </div>
    <div class="d-body" id="d-body"></div>
    <div class="d-footer">
      <button class="btn btn-primary" onclick="saveDrawer()">Save</button>
      <button class="btn btn-ghost" onclick="closeDrawer()">Cancel</button>
      <button class="btn btn-danger" id="btn-del" onclick="deleteLead()">Delete</button>
    </div>
  </div>
</div>

<script>
const today = new Date().toISOString().slice(0,10);
let contacts = [], activities = [], hubs = [];
let config = { repNames:[], sources:[], purposes:[], stages:[], outcomes:[], directions:[] };
let currentUser = null, editId = null, currentTab = 'today';
let sortKey = 'firstContact', sortDir = -1;

function nextWeekday(from,n){let d=new Date(from),c=0;while(c<n){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)c++}return d.toISOString().slice(0,10)}
function initials(name){return(name||'?').split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()}
function lastActivity(c){const acts=activities.filter(a=>String(a.contactId)===String(c.id));if(!acts.length)return null;return acts.slice().sort((a,b)=>a.date<b.date?1:-1)[0]}
function isConverted(c){return !!(c.regDate&&c.rentalDate&&c.rentalDate>=c.regDate&&c.regDate>c.firstContact)}
function isOverdue(c){return !!(c.followUp&&c.followUp<today&&c.stage!=='Converted')}
function isDueToday(c){return c.followUp===today&&c.stage!=='Converted'}
function isNewToday(c){return c.firstContact===today&&c.stage!=='Converted'}
function isCallback(c){if(c.stage==='Converted')return false;const la=lastActivity(c);return !!(la&&la.outcome==='Callback requested')}
function srcClass(s){if(s==='NG Micro-site')return 'src-website';if(['Facebook Ad','Instagram Ad','TikTok Ad','Social Media DM'].includes(s))return 'src-social';if(s==='Radio Ad')return 'src-radio';if(s==='Door-to-door')return 'src-d2d';return 'src-dm'}
function stageClass(s){return{'New':'st-new','In conversation':'st-contacted','Agent details given':'st-details','3-way connected':'st-connected','App registered':'st-contacted','Converted':'st-converted','No local hub':'st-nohub','Complaint open':'st-complaint','No response':'st-noresp'}[s]||'st-new'}

function handleGoogleSignIn(response) {
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const domain = (payload.email||'').split('@')[1]||'';
    if (!ALLOWED_DOMAINS.includes(domain)) { document.getElementById('login-error').style.display='block'; return; }
    currentUser = { name: payload.name, email: payload.email, picture: payload.picture };
    startApp();
  } catch(e) { console.error('SSO error',e); }
}

function signOut() {
  currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function checkSSOConfig() {
  if (!GOOGLE_CLIENT_ID) {
    document.getElementById('login-screen').innerHTML=`
      <div class="login-card">
        <div class="login-logo">MOPO</div>
        <div class="login-sub">Call Centre</div>
        <div style="font-size:12px;color:#888;text-align:center;max-width:260px">Enter your name to continue.</div>
        <div style="display:flex;gap:8px;width:100%">
          <input id="dev-name" placeholder="Your name" style="flex:1;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.15);border-radius:7px;font-size:13px;outline:none">
          <button onclick="devSignIn()" class="btn btn-primary">Go</button>
        </div>
      </div>`;
  }
}

function devSignIn() {
  const name=document.getElementById('dev-name').value.trim();
  if(!name)return;
  currentUser={name,email:name.toLowerCase().replace(' ','.')+'@mobile-power.co.uk',picture:null};
  startApp();
}

async function startApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('user-avatar').textContent=initials(currentUser.name);
  document.getElementById('user-name-display').textContent=currentUser.name;
  try {
    document.getElementById('loading-msg').textContent='Loading config...';
    await loadConfig();
    document.getElementById('loading-msg').textContent='Loading contacts...';
    await loadContacts();
    document.getElementById('loading-msg').textContent='Loading activity log...';
    await loadActivities();
    document.getElementById('loading-msg').textContent='Loading hubs...';
    await loadHubs();
  } catch(e) { document.getElementById('loading-msg').textContent='Error: '+e.message; return; }
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
  renderMetrics(); renderToday();
}

async function appsGet(action) {
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==='PASTE_YOUR_WEB_APP_URL_HERE')return localGet(action);
  const res=await fetch(`${APPS_SCRIPT_URL}?action=${action}`);
  return res.json();
}
async function appsPost(payload) {
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==='PASTE_YOUR_WEB_APP_URL_HERE')return localPost(payload);
  const res=await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
  return res.json();
}

const LS='mopo_cc_local';
function localGet(action){
  const d=JSON.parse(localStorage.getItem(LS)||'{"contacts":[],"activities":[]}');
  if(action==='getContacts')return{contacts:d.contacts||[]};
  if(action==='getActivities')return{activities:d.activities||[]};
  if(action==='getHubs')return{hubs:[]};
  if(action==='getConfig')return{repNames:['Joel Delaney','Phil Howden'],sources:['NG Micro-site','Facebook Ad','Instagram Ad','TikTok Ad','Social Media DM','Radio Ad','Door-to-door'],purposes:['How does MOPO work?','How much does it cost?','Where can I rent near me?','I want to become an agent','I have a problem / complaint','Something else'],    stages:['New','In conversation','Agent details given','3-way connected','No local hub','Complaint open','Potential agent logged','No response'],outcomes:['Answered','No answer','Voicemail left','Callback requested','WhatsApp sent'],directions:['Inbound','Outbound']};
  return{};
}
function localPost(payload){
  const d=JSON.parse(localStorage.getItem(LS)||'{"contacts":[],"activities":[]}');
  if(payload.action==='saveContact'){const idx=d.contacts.findIndex(c=>String(c.id)===String(payload.contact.id));if(idx>=0)d.contacts[idx]=payload.contact;else d.contacts.push(payload.contact);}
  if(payload.action==='deleteContact'){d.contacts=d.contacts.filter(c=>String(c.id)!==String(payload.id));d.activities=d.activities.filter(a=>String(a.contactId)!==String(payload.id));}
  if(payload.action==='saveActivity')d.activities.push(payload.activity);
  localStorage.setItem(LS,JSON.stringify(d));
  return{success:true};
}

async function loadConfig(){const r=await appsGet('getConfig');if(r&&!r.error)config=r;}
async function loadContacts(){const r=await appsGet('getContacts');if(r&&!r.error)contacts=r.contacts||[];}
async function loadActivities(){const r=await appsGet('getActivities');if(r&&!r.error)activities=r.activities||[];}
async function loadHubs(){const r=await appsGet('getHubs');if(r&&!r.error)hubs=r.hubs||[];}

async function persistContact(c){setSaveIndicator('saving');const r=await appsPost({action:'saveContact',contact:c});setSaveIndicator(r&&r.success?'saved':'error');return r;}
async function persistActivity(a){return appsPost({action:'saveActivity',activity:a});}
async function removeContact(id){setSaveIndicator('saving');const r=await appsPost({action:'deleteContact',id});setSaveIndicator(r&&r.success?'saved':'error');return r;}

function setSaveIndicator(state){
  const el=document.getElementById('save-indicator');if(!el)return;
  el.className='save-indicator '+state;
  el.textContent=state==='saving'?'Saving...':state==='saved'?'✓ Saved':'⚠ Error saving';
  if(state==='saved')setTimeout(()=>{el.textContent='';el.className='save-indicator';},2000);
}

function renderMetrics(){
  const conv=contacts.filter(isConverted).length,overdue=contacts.filter(isOverdue).length;
  const noLoc=contacts.filter(c=>!c.location&&c.stage!=='Converted').length;
  const complaints=contacts.filter(c=>c.stage==='Complaint open').length;
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="mc-label">Total contacts</div><div class="mc-val">${contacts.length}</div><div class="mc-sub">all sources</div></div>
    <div class="mc"><div class="mc-label">Converted</div><div class="mc-val g">${conv}</div><div class="mc-sub">first rental done</div></div>
    <div class="mc"><div class="mc-label">Follow-up overdue</div><div class="mc-val ${overdue?'r':''}">${overdue?'⚠ ':''}${overdue}</div><div class="mc-sub">action needed</div></div>
    <div class="mc"><div class="mc-label">No location</div><div class="mc-val ${noLoc?'a':''}">${noLoc?'⚑ ':''}${noLoc}</div><div class="mc-sub">can't route</div></div>
    <div class="mc"><div class="mc-label">Open complaints</div><div class="mc-val ${complaints?'r':''}">${complaints?'! ':''}${complaints}</div><div class="mc-sub">needs team lead</div></div>`;
}

function todayItemHtml(c,showDoneBtn,dueLabel){
  const la=lastActivity(c);
  return`<div class="today-item" onclick="openContact(${c.id})">
    <div class="ti-left">
      <div class="ti-name">${c.name||c.phone||'Unknown'}</div>
      <div class="ti-meta">${c.phone||''}${c.location?' · '+c.location:''}</div>
      <div class="ti-meta" style="margin-top:2px"><span class="badge ${stageClass(c.stage)}" style="font-size:10px">${c.stage}</span>${c.rep?' · '+c.rep:''}</div>
      ${dueLabel?`<div class="ti-due">${dueLabel}</div>`:''}
      ${la&&la.type!=='sys'?`<div class="ti-meta" style="margin-top:3px;font-style:italic">"${(la.notes||'').slice(0,60)}${(la.notes||'').length>60?'…':''}"</div>`:''}
    </div>
    ${showDoneBtn?`<button class="done-btn" onclick="markDone(${c.id},event)">Done ✓</button>`:''}
  </div>`;
}

function markDone(id,e){
  e.stopPropagation();
  const c=contacts.find(x=>x.id===id);if(!c)return;
  c.followUp='';
  const act={id:Date.now(),contactId:id,dir:'Outbound',type:'note',date:today,rep:currentUser?.name||'',notes:'Follow-up marked complete.',outcome:''};
  activities.push(act);
  persistContact(c);persistActivity(act);
  renderToday();renderMetrics();
}

function todayPanel(title,items,tcClass,emptyMsg,showDoneBtn,dueLabelFn){
  const rows=items.length?items.map(c=>todayItemHtml(c,showDoneBtn,dueLabelFn?dueLabelFn(c):'')).join(''):`<div class="today-empty">${emptyMsg}</div>`;
  return`<div class="today-panel"><div class="today-hdr"><span class="today-hdr-title">${title}</span><span class="tc ${tcClass}">${items.length}</span></div>${rows}</div>`;
}

function renderToday(){
  const overdue=contacts.filter(isOverdue).sort((a,b)=>a.followUp<b.followUp?-1:1);
  const dueToday=contacts.filter(c=>isDueToday(c)&&!isOverdue(c));
  const callbacks=contacts.filter(isCallback);
  const newToday=contacts.filter(isNewToday);
  const total=overdue.length+dueToday.length+callbacks.length+newToday.length;
  const dateStr=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('view-today').innerHTML=`
    <div class="today-greeting"><h2>${dateStr}</h2><p>${total===0?'All clear — nothing outstanding.':`${total} item${total>1?'s':''} need attention today.`}</p></div>
    <div class="today-grid">
      ${todayPanel('Overdue follow-ups',overdue,'tc-red','Nothing overdue ✓',true,c=>`Overdue since ${c.followUp}`)}
      ${todayPanel('Due today',dueToday,'tc-amber','No follow-ups due today',true,()=>'')}
      ${todayPanel('Callbacks requested',callbacks,'tc-blue','No callbacks pending',false,()=>'')}
    </div>
    ${newToday.length?`<div class="today-new-panel"><div class="today-hdr"><span class="today-hdr-title">New contacts today</span><span class="tc tc-gray">${newToday.length}</span></div>${newToday.map(c=>todayItemHtml(c,false,'')).join('')}</div>`:''}`;
}

  document.getElementById('view-pipeline').innerHTML=`<div class="pipeline">${stages.map(stage=>{
    const cards=contacts.filter(c=>c.stage===stage);
    return`<div class="stage-col"><div class="stage-hdr"><span class="stage-name">${stage}</span><span class="stage-count">${cards.length}</span></div>
      <div class="stage-cards">${cards.length?cards.map(c=>{
        const la=lastActivity(c);

          <div class="card-name">${c.name||c.phone||'Unknown'}</div>
          <div class="card-sub">${c.location?c.location:`<span class="no-loc-dot"></span><span style="color:#e24b4a;font-size:11px">No location</span>`}</div>

          <div class="card-meta">

            ${isOverdue(c)?`<span class="card-due">⚠ ${c.followUp}</span>`:c.followUp?`<span class="card-due" style="color:#bbb">${c.followUp}</span>`:''}
          </div>
        </div>`}).join(''):`<div style="text-align:center;padding:16px 8px;font-size:12px;color:#ccc">—</div>`}

function renderTableView(){
  const stages=config.stages.length?config.stages:[];
  const sources=config.sources.length?config.sources:[];
  document.getElementById('view-all').innerHTML=`
    <div class="toolbar">
      <input type="text" id="search-all" placeholder="Search name, phone, location..." oninput="refilter()">
      <select id="fdir-all" onchange="refilter()"><option value="">All directions</option><option>Inbound</option><option>Outbound</option></select>
      <select id="fstage-all" onchange="refilter()"><option value="">All stages</option>${stages.map(s=>`<option>${s}</option>`).join('')}</select>
      <select id="fsrc-all" onchange="refilter()"><option value="">All sources</option>${sources.map(s=>`<option>${s}</option>`).join('')}</select>
      <select id="fpurpose-all" onchange="refilter()"><option value="">All purposes</option>${(config.purposes||[]).map(p=>`<option>${p}</option>`).join('')}</select>
    </div>
    <table><thead><tr>
      <th onclick="sortBy('name')">Name</th><th onclick="sortBy('phone')">Phone</th>

      <th onclick="sortBy('followUp')">Follow-up</th><th>Conv.</th>

  refilter();

function refilter(){
  const q=(document.getElementById('search-all')||{}).value||'';
  const fd=(document.getElementById('fdir-all')||{}).value||'';
  const fs=(document.getElementById('fsrc-all')||{}).value||'';
  const fst=(document.getElementById('fstage-all')||{}).value||'';
  const fp=(document.getElementById('fpurpose-all')||{}).value||'';
  let data=contacts.filter(c=>(!q||[c.name,c.phone,c.location,c.hub].some(v=>(v||'').toLowerCase().includes(q.toLowerCase())))&&(!fd||c.firstDir===fd)&&(!fs||c.firstSource===fs)&&(!fst||c.stage===fst)&&(!fp||c.purpose===fp));
  data.sort((a,b)=>{let av=a[sortKey]||'',bv=b[sortKey]||'';return av<bv?-sortDir:av>bv?sortDir:0;});
  const tbody=document.getElementById('all-tbody');if(!tbody)return;
  tbody.innerHTML=data.map(c=>`
    <tr class="${isOverdue(c)?'overdue-row':''}" onclick="openContact(${c.id})">
      <td class="td-name">${c.name||'—'}</td><td style="font-size:12px;color:#555">${c.phone||'—'}</td>
      <td>${c.location||`<span class="loc-missing">⚑ No location</span>`}</td>
      <td><span class="badge ${srcClass(c.firstSource)}">${c.firstSource||'—'}</span></td>
      <td><span class="${c.firstDir==='Inbound'?'dir-in':'dir-out'}">${c.firstDir==='Inbound'?'↙ in':'↗ out'}</span></td>
      <td style="font-size:12px;color:#555">${c.purpose||'—'}</td>
      <td><span class="badge ${stageClass(c.stage)}">${c.stage||'—'}</span></td>
      <td style="font-size:12px;color:#888">${c.firstContact||'—'}</td>
      <td style="font-size:12px;color:${isOverdue(c)?'#a32d2d':'#888'};font-weight:${isOverdue(c)?500:400}">${c.followUp||'—'}</td>
      <td>${isConverted(c)?'<span class="conv-tick">✓</span>':'<span style="color:#bbb">—</span>'}</td>
    </tr>`).join('')||`<tr><td colspan="10" style="text-align:center;padding:32px;color:#bbb;font-size:13px">No contacts match</td></tr>`;
}
function sortBy(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1}refilter();}

function renderReps(){
  const repNames=[...new Set(contacts.map(c=>c.rep).filter(Boolean))];
  const repData=repNames.map(name=>{
    const mine=contacts.filter(c=>c.rep===name);
    const conv=mine.filter(isConverted).length;
    const calls=activities.filter(a=>a.rep===name&&a.type==='call').length;
    const rate=mine.length?Math.round((conv/mine.length)*100):0;
    return{name,total:mine.length,conv,calls,rate};
  }).sort((a,b)=>b.conv-a.conv);
  document.getElementById('view-reps').innerHTML=`
    <div class="reps-grid">${repData.map(r=>`
      <div class="rep-card">
        <div class="rep-avatar">${initials(r.name)}</div>
        <div class="rep-name">${r.name}</div>
        <div class="rep-stats">
          <div class="rep-stat"><div class="rep-stat-val">${r.total}</div><div class="rep-stat-label">Contacts</div></div>
          <div class="rep-stat"><div class="rep-stat-val">${r.calls}</div><div class="rep-stat-label">Calls made</div></div>
          <div class="rep-stat"><div class="rep-stat-val g">${r.conv}</div><div class="rep-stat-label">Converted</div></div>
        </div>
        <div class="rep-rate"><span>${r.rate}% conv. rate</span><div class="rep-bar"><div class="rep-bar-fill" style="width:${r.rate}%"></div></div></div>
      </div>`).join('')||'<p style="color:#bbb;font-size:13px">No rep data yet.</p>'}
    </div>
    <div class="reps-table-wrap">
      <div class="reps-table-hdr">Performance summary</div>
      <table><thead><tr><th>Rep</th><th>Contacts</th><th>Calls made</th><th>Converted</th><th>Conv. rate</th></tr></thead>
      <tbody>${repData.map(r=>`<tr>
        <td style="font-weight:500">${r.name}</td><td>${r.total}</td><td>${r.calls}</td>
        <td style="color:#3b6d11;font-weight:500">${r.conv}</td>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="rep-bar" style="width:80px"><div class="rep-bar-fill" style="width:${r.rate}%"></div></div><span>${r.rate}%</span></div></td>
      </tr>`).join('')}</tbody></table>
    </div>`;
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['today','pipeline','all','reps'].forEach(v=>document.getElementById(`view-${v}`).style.display='none');
  document.getElementById(`view-${tab}`).style.display='block';
  if(tab==='today')renderToday();
  else if(tab==='pipeline')renderPipeline();
  else if(tab==='all')renderTableView();
  else if(tab==='reps')renderReps();
  renderMetrics();
}

function hubSearchHtml(selectedHub){
  return`<div class="hub-search-wrap">
    <input type="text" id="hub-search-input" placeholder="Search hubs..." autocomplete="off"
      value="${selectedHub||''}" oninput="filterHubs(this.value)" onfocus="filterHubs(this.value)" onblur="setTimeout(()=>closeHubDropdown(),200)">
    <div class="hub-dropdown" id="hub-dropdown"></div>
  </div>
  <input type="hidden" id="f-hub" value="${selectedHub||''}">`;
}

function filterHubs(q){
  const dd=document.getElementById('hub-dropdown');if(!dd)return;
  const filtered=hubs.filter(h=>!q||h.name.toLowerCase().includes(q.toLowerCase())||(h.region||'').toLowerCase().includes(q.toLowerCase()));
  if(!filtered.length){dd.classList.remove('open');return;}
  dd.innerHTML=filtered.slice(0,20).map(h=>`
    <div class="hub-opt" onmousedown="selectHub('${h.name.replace(/'/g,"\\'")}')">
      <div><div class="hub-opt-name">${h.name}</div><div class="hub-opt-meta">${h.region||''}</div></div>
      <span class="hub-product-badge ${h.product==='GENREP'?'hub-genrep':'hub-mopo50'}">${h.product||'MOPO50'}</span>
    </div>`).join('');
  dd.classList.add('open');
}

function selectHub(name){
  const inp=document.getElementById('hub-search-input');
  const hid=document.getElementById('f-hub');
  if(inp)inp.value=name;if(hid)hid.value=name;
  closeHubDropdown();
  const slot=document.getElementById('hub-panel-slot');
  if(slot){
    slot.innerHTML=`<div style="font-size:12px;color:#888;padding:8px 0">Loading agents...</div>`;
    appsGet(`getAgents&hub=${encodeURIComponent(name)}`).then(r=>{
      const agents=r.agents||[];
      if(!agents.length){
        slot.innerHTML=`<div class="hub-panel"><div class="hub-panel-hdr">Agents — ${name}</div><div class="agent-row"><div style="font-size:12px;color:#888">No active agents found in the last 24 hours.</div></div></div>`;
        return;
      }
      slot.innerHTML=`<div class="hub-panel">
        <div class="hub-panel-hdr">Active agents — ${name}</div>
        ${agents.map(a=>`<div class="agent-row">
          <div><div class="agent-name">${a.name}</div><div class="agent-meta">${a.phone||'No number'} · Last rental: ${a.lastRental?a.lastRental.slice(0,16).replace('T',' '):'—'}</div></div>
          ${a.phone?`<a href="tel:${a.phone}" style="padding:4px 11px;background:#1a1a18;color:#fff;border-radius:6px;font-size:11px;text-decoration:none;white-space:nowrap">Call 3-way</a>`:''}
        </div>`).join('')}
      </div>`;
    }).catch(()=>{
      slot.innerHTML=`<div style="font-size:12px;color:#a32d2d;padding:8px 0">Could not load agents.</div>`;
    });
  }
}

function closeHubDropdown(){const dd=document.getElementById('hub-dropdown');if(dd)dd.classList.remove('open');}

      <div style="font-size:12px;color:#555">For now: check the MOPO app or contact your Area Manager for agent numbers at this hub.</div>
    </div>

function convPathHtml(c){
  const steps=['Contact in','Contacted','Hub matched','Agent connected','Converted'];
  const idx={'New':0,'In conversation':1,'No response':1,'No local hub':2,'Agent details given':2,'3-way connected':3,'App registered':3,'Complaint open':1,'Converted':4};
  const cur=isConverted(c)?5:(idx[c.stage]??0);
  return`<div class="conv-path">${steps.map((s,i)=>`<div class="cp-step ${i<cur?'done':i===cur?'active':''}">${s}</div>`).join('')}</div>`;
}

function buildDrawer(c){
  const isNewC=!c;
  document.getElementById('d-title').textContent=isNewC?'New contact':(c.name||c.phone||'Contact');
  document.getElementById('btn-del').style.display=isNewC?'none':'block';
  if(!c)c={id:null,name:'',phone:'',location:'',hub:'',firstSource:'',firstDir:'Inbound',purpose:'',stage:'New',rep:currentUser?.name||'',firstContact:today,followUp:nextWeekday(today,7),regDate:'',rentalDate:'',agentsConnected:[]};
  const myActivities=activities.filter(a=>String(a.contactId)===String(c.id));
  const actHtml=myActivities.slice().reverse().map(a=>`
    <div class="act-item${a.type==='sys'?' sys':''}">
      <div class="act-top">
        <div class="act-label">
          <span class="act-type ${a.type}">${{call:'Call',transfer:'Transfer',note:'Note',sys:'System'}[a.type]||a.type}</span>
          ${a.dir?`<span class="${a.dir==='Inbound'?'dir-in':'dir-out'}">${a.dir==='Inbound'?'↙ in':'↗ out'}</span>`:''}
        </div>
        <span class="act-date">${a.date}</span>
      </div>
      <div class="act-body">${a.notes||''}</div>
      ${a.rep?`<div class="act-rep">Rep: ${a.rep}</div>`:''}
      ${a.outcome?`<span class="out-pill out-${a.outcome.toLowerCase().replace(/\s/g,'-')}">${a.outcome}</span>`:''}
    </div>`).join('')||'<div class="act-item sys"><div class="act-body">No activity yet.</div></div>';
  const stages=config.stages.length?config.stages:['New','In conversation','Agent details given','3-way connected','No local hub','Complaint open','Agent enquiry logged','No response'];
  const sources=config.sources.length?config.sources:[];
  const purposes=config.purposes.length?config.purposes:[];
  const outcomes=config.outcomes.length?config.outcomes:['Answered','No answer','Voicemail left','Callback requested','WhatsApp sent'];
  const repNames=config.repNames.length?config.repNames:[];
  const isComplaint=c.stage==='Complaint open';
  document.getElementById('d-body').innerHTML=`
    ${!isNewC?convPathHtml(c):''}
    <div class="sec"><div class="sec-title">Contact details</div>
      <div class="fg">
        <div class="f">
          <div class="f-lbl-row"><label>Phone</label>${c.firstDir==='Inbound'?'<span class="auto-tag">auto on call connect</span>':''}</div>
          <input id="f-phone" value="${c.phone||''}" placeholder="${c.firstDir==='Outbound'?'+234...':''}">
        </div>
        <div class="f"><label>Name</label><input id="f-name" value="${c.name||''}" placeholder="Entered by rep"></div>
        <div class="f f-full"><label>Location / area</label>
          <input id="f-location" value="${c.location||''}" placeholder="e.g. Kano Central">
          <a class="loc-btn" onclick="openWA()" href="#" target="_blank">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="5.5" r="2.5"/><path d="M7 14C7 14 1.5 9 1.5 5.5a5.5 5.5 0 0111 0C12.5 9 7 14 7 14z"/></svg>
            Send location request via WhatsApp
          </a>
        </div>
      </div>
    </div>
    <div class="sec"><div class="sec-title">Hub & agent routing</div>
      ${hubSearchHtml(c.hub)}
      <div id="hub-panel-slot" style="margin-top:6px">${hubAgentPanel(c)}</div>
    </div>
    <div class="sec"><div class="sec-title">Lead info</div>
      <div class="fg">
        <div class="f"><label>Direction</label>
          <select id="f-dir"><option${c.firstDir==='Inbound'?' selected':''}>Inbound</option><option${c.firstDir==='Outbound'?' selected':''}>Outbound</option></select>
        </div>
        <div class="f"><label>Source</label>
          <select id="f-source"><option value="">— select —</option>${sources.map(s=>`<option${s===c.firstSource?' selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div class="f f-full"><label>Purpose</label>
          <select id="f-purpose"><option value="">— select —</option>${purposes.map(p=>`<option${p===c.purpose?' selected':''}>${p}</option>`).join('')}</select>
        </div>
        <div class="f"><label>Stage</label>
          <select id="f-stage" onchange="stageChanged(this)">${stages.map(s=>`<option${s===c.stage?' selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div class="f"><label>First contact date</label><input type="date" id="f-firstContact" value="${c.firstContact||today}"></div>
        <div class="f">
          <div class="f-lbl-row"><label>Follow-up due</label><span class="auto-tag">+7 weekdays</span></div>
          <input type="date" id="f-followUp" value="${c.followUp||''}">
        </div>
      </div>
      ${isComplaint?`<div class="alert alert-red"><strong>⚠ Complaint — escalate to Regional Team Lead</strong>Ensure all notes are complete before saving.</div>`:''}
      <div id="complaint-slot"></div>
    </div>
    <div class="sec"><div class="sec-title">Conversion tracking <span class="auto-tag">auto from MOPO Platform</span></div>
      <div class="fg">
        <div class="f"><div class="f-lbl-row"><label>App registration date</label><span class="auto-tag">auto</span></div>
          <input id="f-regDate" value="${c.regDate||''}" class="auto-input" placeholder="From MOPO Platform"></div>
        <div class="f"><div class="f-lbl-row"><label>First rental date</label><span class="auto-tag">auto</span></div>
          <input id="f-rentalDate" value="${c.rentalDate||''}" class="auto-input" placeholder="From MOPO Platform"></div>
      </div>
      ${isConverted(c)?`<div class="alert alert-green"><strong>✓ Converted — commission triggered</strong>Rep: ${c.rep||'—'}</div>`:''}
      ${c.regDate&&!c.rentalDate?`<div class="alert alert-amber">App registered — awaiting first rental.</div>`:''}
    </div>
    ${!isNewC?`<div class="sec"><div class="sec-title">Activity log</div>
      <div class="act-log">
        ${actHtml}
        <div class="act-add">
          <div class="act-add-row">
            <select id="act-dir"><option>Inbound</option><option>Outbound</option></select>
            <select id="act-type"><option value="call">Call</option><option value="transfer">Transfer</option><option value="note">Note</option></select>
            <select id="act-out"><option value="">— outcome —</option>${outcomes.map(o=>`<option>${o}</option>`).join('')}</select>
          </div>
          <textarea id="act-notes" placeholder="What was discussed, agreed, next steps..."></textarea>
          <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="addActivity(${c.id})">+ Log activity</button>
        </div>
      </div>
    </div>`:''}`;
}

function stageChanged(sel){
  const slot=document.getElementById('complaint-slot');if(!slot)return;
  slot.innerHTML=sel.value==='Complaint open'?`<div class="alert alert-red" style="margin-top:8px"><strong>⚠ Complaint — escalate to Regional Team Lead</strong></div>`:'';
}

async function addActivity(id){
  const notes=(document.getElementById('act-notes')||{}).value||'';
  if(!notes.trim())return;
  const act={id:Date.now(),contactId:id,dir:document.getElementById('act-dir').value,type:document.getElementById('act-type').value,date:today,rep:currentUser?.name||'',notes:notes.trim(),outcome:document.getElementById('act-out').value};
  activities.push(act);
  await persistActivity(act);
  buildDrawer(contacts.find(c=>c.id===id));
}

function openNew(){editId=null;buildDrawer(null);document.getElementById('overlay').classList.add('open');}
function openContact(id){editId=id;buildDrawer(contacts.find(c=>c.id===id));document.getElementById('overlay').classList.add('open');}
function closeDrawer(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeDrawer();}

async function saveDrawer(){
  const existing=editId?contacts.find(c=>c.id===editId):null;
  const rec={
    id:editId||Date.now(),
    name:(document.getElementById('f-name')||{}).value||'',
    phone:(document.getElementById('f-phone')||{}).value||'',
    location:(document.getElementById('f-location')||{}).value||'',
    hub:(document.getElementById('f-hub')||{}).value||'',
    firstSource:(document.getElementById('f-source')||{}).value||'',
    firstDir:(document.getElementById('f-dir')||{}).value||'Inbound',
    purpose:(document.getElementById('f-purpose')||{}).value||'',
    stage:(document.getElementById('f-stage')||{}).value||'New',
    rep:currentUser?.name||'',
    firstContact:(document.getElementById('f-firstContact')||{}).value||today,
    followUp:(document.getElementById('f-followUp')||{}).value||'',
    regDate:(document.getElementById('f-regDate')||{}).value||'',
    rentalDate:(document.getElementById('f-rentalDate')||{}).value||'',
    agentsConnected:existing?existing.agentsConnected||[]:[],
  };
  if(!rec.name&&!rec.phone){alert('Name or phone required.');return;}
  if(editId)contacts=contacts.map(c=>c.id===editId?rec:c);
  else{
    const initAct={id:Date.now()+1,contactId:rec.id,dir:rec.firstDir,type:'sys',date:today,rep:currentUser?.name||'',notes:'Contact created.',outcome:''};
    activities.push(initAct);
    await persistActivity(initAct);
    contacts.push(rec);
  }
  await persistContact(rec);
  closeDrawer();
  if(currentTab==='today')renderToday();
  else if(currentTab==='pipeline')renderPipeline();
  else if(currentTab==='all')refilter();
  else if(currentTab==='reps')renderReps();
  renderMetrics();
}

async function deleteLead(){
  if(!editId||!confirm('Delete this contact?'))return;
  contacts=contacts.filter(c=>c.id!==editId);
  activities=activities.filter(a=>String(a.contactId)!==String(editId));
  await removeContact(editId);
  closeDrawer();
  if(currentTab==='today')renderToday();
  else if(currentTab==='pipeline')renderPipeline();
  else if(currentTab==='all')refilter();
  else if(currentTab==='reps')renderReps();
  renderMetrics();
}

checkSSOConfig();
</script>
</body>
</html>
