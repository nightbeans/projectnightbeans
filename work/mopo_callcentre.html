<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efe9;color:#1a1a18;min-height:100vh;font-size:14px}
.hdr{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:0 20px;display:flex;align-items:center;height:48px;gap:0}
.hdr-title{font-size:14px;font-weight:500;padding-right:16px;border-right:0.5px solid rgba(0,0,0,0.1);margin-right:4px;white-space:nowrap}
.tab{padding:0 16px;height:48px;display:flex;align-items:center;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18}
.tab:hover:not(.active){color:#444}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{padding:6px 14px;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-primary{background:#1a1a18;color:#fff;border:none}.btn-primary:hover{background:#333}
.btn-ghost{background:#fff;color:#1a1a18;border:0.5px solid rgba(0,0,0,0.15)}.btn-ghost:hover{background:#f5f4f0}
.btn-danger{background:#fff;color:#a32d2d;border:0.5px solid rgba(162,45,45,0.3);padding:6px 14px;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit;margin-left:auto}.btn-danger:hover{background:#fcebeb}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px 20px}
.mc{background:#fff;border-radius:10px;padding:12px 14px;border:0.5px solid rgba(0,0,0,0.07)}
.mc-label{font-size:11px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.mc-val{font-size:22px;font-weight:500}
.mc-val.g{color:#3b6d11}.mc-val.b{color:#185fa5}.mc-val.a{color:#854f0b}.mc-val.r{color:#a32d2d}
.mc-sub{font-size:11px;color:#bbb;margin-top:2px}
/* TODAY */
.today-outer{padding:0 20px 32px}
.today-greeting{margin-bottom:16px}
.today-greeting h2{font-size:16px;font-weight:500;margin-bottom:3px}
.today-greeting p{font-size:13px;color:#888}
.today-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.today-panel{background:#fff;border-radius:10px;border:0.5px solid rgba(0,0,0,0.07);overflow:hidden}
.today-hdr{padding:10px 14px;border-bottom:0.5px solid rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:space-between}
.today-hdr-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:#888}
.tc{font-size:11px;padding:2px 8px;border-radius:20px}
.tc-red{background:#fcebeb;color:#a32d2d}
.tc-amber{background:#faeeda;color:#854f0b}
.tc-blue{background:#e6f1fb;color:#185fa5}
.tc-gray{background:#f1efe8;color:#5f5e5a}
.today-item{padding:10px 14px;border-bottom:0.5px solid rgba(0,0,0,0.06);cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.today-item:last-child{border-bottom:none}
.today-item:hover{background:#faf9f6}
.ti-left{flex:1;min-width:0}
.ti-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-meta{font-size:11px;color:#888;line-height:1.5}
.ti-due{font-size:11px;color:#a32d2d;font-weight:500;margin-top:2px}
.done-btn{flex-shrink:0;font-size:11px;padding:3px 9px;background:#f0efe9;border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;cursor:pointer;color:#888;font-family:inherit;white-space:nowrap}
.done-btn:hover{background:#eaf3de;color:#3b6d11;border-color:rgba(59,109,17,0.2)}
.today-empty{padding:20px 14px;font-size:12px;color:#bbb;text-align:center}
.today-new-panel{background:#fff;border-radius:10px;border:0.5px solid rgba(0,0,0,0.07);overflow:hidden}
/* PIPELINE */
.pipeline-wrap{padding:0 20px 20px;overflow-x:auto}
.pipeline{display:flex;gap:10px;min-width:900px}
.stage-col{flex:1;min-width:155px;background:#fff;border-radius:10px;border:0.5px solid rgba(0,0,0,0.07);overflow:hidden}
.stage-hdr{padding:10px 12px;border-bottom:0.5px solid rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:space-between}
.stage-name{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:#888}
.stage-count{font-size:11px;background:#f0efe9;padding:2px 7px;border-radius:20px;color:#888}
.stage-cards{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:48px}
.card{background:#f8f7f3;border-radius:8px;padding:10px 11px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.06);transition:all .12s}
.card:hover{background:#f0efe9;border-color:rgba(0,0,0,0.12)}
.card.overdue{border-left:3px solid #e24b4a}
.card.complaint{border-left:3px solid #e24b4a;background:#fff8f8}
.card-name{font-size:13px;font-weight:500;margin-bottom:2px}
.card-sub{font-size:11px;color:#888;margin-bottom:4px}
.card-last{font-size:10px;color:#bbb;margin-bottom:4px}
.card-meta{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.card-due{font-size:10px;color:#a32d2d;font-weight:500;margin-left:auto}
.card-due.ok{color:#bbb}
.no-loc-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#e24b4a;margin-right:3px;vertical-align:middle}
/* TABLE */
.view{padding:0 20px 32px}
.toolbar{display:flex;align-items:center;gap:8px;padding:0 0 12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 11px;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;font-size:13px;background:#fff;outline:none;font-family:inherit}
.toolbar input{flex:1;min-width:160px}
.toolbar input:focus,.toolbar select:focus{border-color:rgba(0,0,0,0.3)}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:0.5px solid rgba(0,0,0,0.07);font-size:13px}
thead th{padding:9px 12px;text-align:left;font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid rgba(0,0,0,0.07);background:#faf9f6;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:#333}
tbody tr{border-bottom:0.5px solid rgba(0,0,0,0.05);cursor:pointer;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf9f6}
td{padding:10px 12px;vertical-align:middle}
.td-name{font-weight:500}
.overdue-row td:first-child{border-left:3px solid #e24b4a}
/* REPS */
.reps-wrap{padding:0 20px 32px}
.reps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.rep-card{background:#fff;border-radius:10px;border:0.5px solid rgba(0,0,0,0.07);padding:16px}
.rep-avatar{width:36px;height:36px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#185fa5;margin-bottom:10px}
.rep-name{font-size:14px;font-weight:500;margin-bottom:10px}
.rep-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.rep-stat{text-align:center;padding:8px 4px;background:#f8f7f3;border-radius:7px}
.rep-stat-val{font-size:18px;font-weight:500}.rep-stat-val.g{color:#3b6d11}
.rep-stat-label{font-size:10px;color:#888;margin-top:2px}
.rep-rate{margin-top:10px;font-size:12px;color:#888;display:flex;align-items:center;gap:8px}
.rep-bar{flex:1;height:4px;background:#f0efe9;border-radius:2px;overflow:hidden}
.rep-bar-fill{height:100%;background:#3b6d11;border-radius:2px}
.reps-table-wrap{background:#fff;border-radius:10px;border:0.5px solid rgba(0,0,0,0.07);overflow:hidden}
.reps-table-hdr{padding:10px 14px;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:#888}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.src-website{background:#e6f1fb;color:#185fa5}.src-social{background:#eeedfe;color:#534ab7}
.src-radio{background:#faeeda;color:#854f0b}.src-d2d{background:#eaf3de;color:#3b6d11}.src-dm{background:#f1efe8;color:#5f5e5a}
.st-new{background:#f1efe8;color:#5f5e5a}.st-contacted{background:#e6f1fb;color:#185fa5}
.st-connected{background:#eaf3de;color:#3b6d11}.st-details{background:#eeedfe;color:#534ab7}
.st-recruited{background:#faeeda;color:#854f0b}.st-nohub{background:#fcebeb;color:#a32d2d}
.st-complaint{background:#fcebeb;color:#a32d2d;border:0.5px solid #f09595}
.st-converted{background:#eaf3de;color:#27500a;border:0.5px solid #97c459}
.st-noanswer{background:#faeeda;color:#854f0b}
.loc-missing{color:#e24b4a;font-size:12px;font-style:italic}
.conv-tick{color:#3b6d11;font-weight:500}
.dir-in{background:#eaf3de;color:#3b6d11;font-size:10px;padding:1px 6px;border-radius:10px}
.dir-out{background:#e6f1fb;color:#185fa5;font-size:10px;padding:1px 6px;border-radius:10px}
/* DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:200;align-items:flex-start;justify-content:flex-end}
.overlay.open{display:flex}
.drawer{background:#fff;width:540px;max-width:100vw;height:100vh;overflow-y:auto;border-left:0.5px solid rgba(0,0,0,0.1);display:flex;flex-direction:column}
.d-hdr{padding:14px 18px;border-bottom:0.5px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.d-hdr h2{font-size:15px;font-weight:500}
.close-btn{background:none;border:none;font-size:20px;color:#888;cursor:pointer;line-height:1}
.d-body{padding:18px;flex:1}
.d-footer{padding:12px 18px;border-top:0.5px solid rgba(0,0,0,0.08);display:flex;gap:8px;position:sticky;bottom:0;background:#fff}
.sec{margin-bottom:20px}
.sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f{margin-bottom:0}
.f-lbl-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.f-lbl-row label{font-size:11px;color:#888;margin:0}
.auto-tag{font-size:10px;background:#f0efe9;color:#888;padding:1px 6px;border-radius:10px}
.f label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.f input,.f select,.f textarea{width:100%;padding:7px 10px;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#1a1a18}
.f input:focus,.f select:focus,.f textarea:focus{border-color:rgba(0,0,0,0.3)}
.f textarea{height:56px;resize:vertical}
.f-full{grid-column:1/-1}
.auto-input{background:#f8f7f3!important;color:#888!important}
.conv-path{display:flex;margin-bottom:18px}
.cp-step{flex:1;text-align:center;padding:5px 2px;font-size:10px;background:#f0efe9;color:#888;position:relative}
.cp-step:not(:last-child):after{content:'›';position:absolute;right:-5px;top:50%;transform:translateY(-50%);color:#ccc;z-index:1;font-size:12px}
.cp-step.done{background:#eaf3de;color:#3b6d11;font-weight:500}
.cp-step.active{background:#e6f1fb;color:#185fa5;font-weight:500}
.cp-step:first-child{border-radius:6px 0 0 6px}.cp-step:last-child{border-radius:0 6px 6px 0}
.hub-panel{border:0.5px solid rgba(0,0,0,0.08);border-radius:8px;overflow:hidden;margin-top:6px}
.hub-panel-hdr{padding:7px 12px;background:#f8f7f3;font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.agent-row{padding:9px 12px;border-bottom:0.5px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between}
.agent-row:last-child{border-bottom:none}
.agent-name{font-size:13px;font-weight:500}.agent-meta{font-size:11px;color:#888;margin-top:1px}
.agent-dist{font-size:11px;color:#185fa5;font-weight:500;margin-right:8px}
.call-btn{padding:4px 11px;background:#1a1a18;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer}
.call-btn:hover{background:#333}.call-btn.done{background:#3b6d11}
.loc-btn{display:flex;align-items:center;gap:6px;padding:7px 11px;background:#fff;border:0.5px solid rgba(0,0,0,0.13);border-radius:7px;font-size:12px;cursor:pointer;color:#185fa5;width:100%;margin-top:6px;font-family:inherit}
.loc-btn:hover{background:#e6f1fb}
.act-log{border:0.5px solid rgba(0,0,0,0.07);border-radius:8px;overflow:hidden}
.act-item{padding:9px 12px;border-bottom:0.5px solid rgba(0,0,0,0.06);font-size:12px}
.act-item:last-child{border-bottom:none}
.act-item.sys{background:#faf9f6;color:#888}
.act-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;gap:6px}
.act-label{display:flex;align-items:center;gap:5px}
.act-type{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.act-type.call{color:#185fa5}.act-type.transfer{color:#854f0b}.act-type.note{color:#534ab7}.act-type.sys{color:#aaa}
.act-date{font-size:10px;color:#bbb;white-space:nowrap}
.act-body{color:#555;line-height:1.5}
.act-rep{font-size:10px;color:#aaa;margin-top:2px}
.out-pill{display:inline-block;margin-top:3px;font-size:10px;padding:1px 7px;border-radius:20px}
.out-answered{background:#eaf3de;color:#3b6d11}.out-no-answer{background:#fcebeb;color:#a32d2d}.out-callback{background:#faeeda;color:#854f0b}
.act-add{padding:10px 12px;background:#f8f7f3;border-top:0.5px solid rgba(0,0,0,0.07)}
.act-add-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.act-add select,.act-add textarea{width:100%;padding:6px 9px;border:0.5px solid rgba(0,0,0,0.12);border-radius:6px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.act-add textarea{height:46px;resize:none;margin-bottom:6px}
.alert{padding:9px 12px;border-radius:7px;font-size:12px;margin-top:8px}
.alert-red{background:#fcebeb;color:#a32d2d;border:0.5px solid #f09595}
.alert-amber{background:#faeeda;color:#854f0b}
.alert-green{background:#eaf3de;color:#3b6d11}
.alert strong{display:block;margin-bottom:2px;font-size:13px}
@media(max-width:900px){.today-grid{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.today-grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.fg{grid-template-columns:1fr}.drawer{width:100vw}}
</style>
</head>

let editId=null,currentTab='today',sortKey='firstContact',sortDir=-1;
function save(){localStorage.setItem(SK,JSON.stringify(contacts))}
function isConverted(c){return !!(c.regDate&&c.rentalDate&&c.rentalDate>=c.regDate&&c.regDate>c.firstContact)}
function isOverdue(c){return !!(c.followUp&&c.followUp<today&&c.stage!=='Converted')}
function isDueToday(c){return c.followUp===today&&c.stage!=='Converted'}
function isNewToday(c){return c.firstContact===today&&c.stage!=='Converted'}
function isCallback(c){
  if(c.stage==='Converted')return false;
  const la=lastActivity(c);
  return !!(la&&la.outcome==='callback');
}

function srcClass(s){
  if(['NG Website','NG Website form'].includes(s))return 'src-website';
  if(['Facebook','Instagram','TikTok','Social media form','Social media DM'].includes(s))return 'src-social';
  if(s==='Radio')return 'src-radio';
  if(['Door-to-door','Door-to-door list'].includes(s))return 'src-d2d';
  return 'src-dm';
}
function stageClass(s){
  return{New:'st-new',Contacted:'st-contacted','Connected with agent':'st-connected','Gave hub / agent details':'st-details','Registered potential agent':'st-recruited','No local hub':'st-nohub','Logged complaint':'st-complaint',Converted:'st-converted'}[s]||'st-new';
}

function renderMetrics(){
  const conv=contacts.filter(isConverted).length;
  const overdue=contacts.filter(isOverdue).length;
  const noLoc=contacts.filter(c=>!c.location&&c.stage!=='Converted').length;
  const complaints=contacts.filter(c=>c.stage==='Logged complaint').length;
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="mc-label">Total contacts</div><div class="mc-val">${contacts.length}</div><div class="mc-sub">all sources</div></div>
    <div class="mc"><div class="mc-label">Converted</div><div class="mc-val g">${conv}</div><div class="mc-sub">first rental done</div></div>
    <div class="mc"><div class="mc-label">Follow-up overdue</div><div class="mc-val ${overdue?'r':''}">${overdue?'⚠ ':''}${overdue}</div><div class="mc-sub">action needed</div></div>
    <div class="mc"><div class="mc-label">No location</div><div class="mc-val ${noLoc?'a':''}">${noLoc?'⚑ ':''}${noLoc}</div><div class="mc-sub">can't route to agent</div></div>
    <div class="mc"><div class="mc-label">Open complaints</div><div class="mc-val ${complaints?'r':''}">${complaints?'! ':''}${complaints}</div><div class="mc-sub">needs team lead</div></div>`;
}

// ---- TODAY ----
function todayItemHtml(c,showDoneBtn,dueLabel){
  const la=lastActivity(c);
  return`<div class="today-item" onclick="openContact(${c.id})">
    <div class="ti-left">
      <div class="ti-name">${c.name}</div>
      <div class="ti-meta">${c.phone}${c.location?' · '+c.location:''}</div>
      <div class="ti-meta" style="margin-top:2px"><span class="badge ${stageClass(c.stage)}" style="font-size:10px">${c.stage}</span>${c.rep?' · Rep: '+c.rep:''}</div>
      ${dueLabel?`<div class="ti-due">${dueLabel}</div>`:''}
      ${la&&la.type!=='sys'?`<div class="ti-meta" style="margin-top:3px;font-style:italic">"${la.notes.slice(0,55)}${la.notes.length>55?'…':''}"</div>`:''}
    </div>
    ${showDoneBtn?`<button class="done-btn" onclick="markDone(${c.id},event)">Done ✓</button>`:''}
  </div>`;
}

function markDone(id,e){
  e.stopPropagation();
  const c=contacts.find(x=>x.id===id);if(!c)return;
  c.followUp='';
  c.activities=c.activities||[];
  c.activities.push({id:Date.now(),dir:'outbound',type:'note',date:today,rep:'',notes:'Follow-up marked complete.',outcome:''});
  save();renderToday();renderMetrics();
}

function todayPanel(title,items,tcClass,emptyMsg,showDoneBtn,dueLabelFn){
  const rows=items.length
    ?items.map(c=>todayItemHtml(c,showDoneBtn,dueLabelFn?dueLabelFn(c):'')).join('')
    :`<div class="today-empty">${emptyMsg}</div>`;
  return`<div class="today-panel">
    <div class="today-hdr"><span class="today-hdr-title">${title}</span><span class="tc ${tcClass}">${items.length}</span></div>
    ${rows}
  </div>`;
}

function renderToday(){
  const overdue=contacts.filter(isOverdue).sort((a,b)=>a.followUp<b.followUp?-1:1);
  const dueToday=contacts.filter(c=>isDueToday(c)&&!isOverdue(c));
  const callbacks=contacts.filter(isCallback);
  const newToday=contacts.filter(isNewToday);
  const total=overdue.length+dueToday.length+callbacks.length+newToday.length;

  const dateStr=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const summary=total===0?'All clear — nothing outstanding right now.':`${total} item${total>1?'s':''} need attention today.`;

  document.getElementById('view-today').innerHTML=`
    <div class="today-greeting">
      <h2>${dateStr}</h2>
      <p>${summary}</p>
    </div>
    <div class="today-grid">
      ${todayPanel('Overdue follow-ups',overdue,'tc-red','Nothing overdue ✓',true,c=>`Overdue since ${c.followUp}`)}
      ${todayPanel('Due today',dueToday,'tc-amber','No follow-ups due today',true,()=>'')}
      ${todayPanel('Callbacks requested',callbacks,'tc-blue','No callbacks pending',false,()=>'')}
    </div>
    ${newToday.length?`<div class="today-new-panel">
      <div class="today-hdr"><span class="today-hdr-title">New contacts today</span><span class="tc tc-gray">${newToday.length}</span></div>
      ${newToday.map(c=>todayItemHtml(c,false,'')).join('')}
    </div>`:''}`;
}

function refilter(){
  const q=(document.getElementById('search-all')||{}).value||'';
  const fd=(document.getElementById('fdir-all')||{}).value||'';
  const fs=(document.getElementById('fsrc-all')||{}).value||'';
  const fst=(document.getElementById('fstage-all')||{}).value||'';
  const fp=(document.getElementById('fpurpose-all')||{}).value||'';
  let data=contacts.filter(c=>
    (!q||[c.name,c.phone,c.location,c.hub].some(v=>(v||'').toLowerCase().includes(q.toLowerCase())))&&
    (!fd||c.firstDir===fd)&&(!fs||c.firstSource===fs)&&(!fst||c.stage===fst)&&(!fp||c.purpose===fp)
  );
  data.sort((a,b)=>{let av=a[sortKey]||'',bv=b[sortKey]||'';return av<bv?-sortDir:av>bv?sortDir:0});
  const tbody=document.getElementById('all-tbody');
  if(!tbody)return;
  tbody.innerHTML=data.map(c=>`
    <tr class="${isOverdue(c)?'overdue-row':''}" onclick="openContact(${c.id})">
      <td class="td-name">${c.name}</td>
      <td style="font-size:12px;color:#555">${c.phone}</td>
      <td>${c.location||`<span class="loc-missing">⚑ No location</span>`}</td>
      <td><span class="badge ${srcClass(c.firstSource)}">${c.firstSource}</span></td>
      <td><span class="${c.firstDir==='inbound'?'dir-in':'dir-out'}">${c.firstDir==='inbound'?'↙ in':'↗ out'}</span></td>
      <td style="font-size:12px;color:#555">${c.purpose||'—'}</td>
      <td><span class="badge ${stageClass(c.stage)}">${c.stage}</span></td>
      <td style="font-size:12px;color:#888">${c.firstContact||'—'}</td>
      <td style="font-size:12px;color:${isOverdue(c)?'#a32d2d':'#888'};font-weight:${isOverdue(c)?500:400}">${c.followUp||'—'}</td>
      <td>${isConverted(c)?'<span class="conv-tick">✓</span>':'<span style="color:#bbb">—</span>'}</td>
    </tr>`).join('')||`<tr><td colspan="10" style="text-align:center;padding:32px;color:#bbb;font-size:13px">No contacts match</td></tr>`;
}
function sortBy(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1}refilter()}

function renderReps(){
  const repNames=[...new Set(contacts.map(c=>c.rep).filter(Boolean))];
  const repData=repNames.map(name=>{
    const mine=contacts.filter(c=>c.rep===name);
    const conv=mine.filter(isConverted).length;
    const calls=mine.reduce((sum,c)=>sum+(c.activities||[]).filter(a=>a.type==='call'&&a.rep===name).length,0);
    const rate=mine.length?Math.round((conv/mine.length)*100):0;
    return{name,total:mine.length,conv,calls,rate};
  }).sort((a,b)=>b.conv-a.conv);

  document.getElementById('view-reps').innerHTML=`
    <div class="reps-grid">${repData.map(r=>`

      <table>
        <thead><tr><th>Rep</th><th>Contacts</th><th>Calls made</th><th>Converted</th><th>Conv. rate</th></tr></thead>
        <tbody>${repData.map(r=>`
          <tr>

// ---- TABS ----
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['today','pipeline','all','reps'].forEach(v=>document.getElementById(`view-${v}`).style.display='none');
  document.getElementById(`view-${tab}`).style.display='block';
  if(tab==='today')renderToday();
  else if(tab==='pipeline')renderPipeline();
  else if(tab==='all')renderTableView();
  else if(tab==='reps')renderReps();
  renderMetrics();
}

function convPathHtml(c){
  const steps=['Contact in','Contacted','Hub matched','Agent connected','Converted'];
  const idx={New:0,Contacted:1,'No answer':1,'Logged complaint':1,'No local hub':2,'Gave hub / agent details':2,'Registered potential agent':2,'Connected with agent':3,Converted:4};
  const cur=isConverted(c)?5:(idx[c.stage]??0);
  return`<div class="conv-path">${steps.map((s,i)=>`<div class="cp-step ${i<cur?'done':i===cur?'active':''}">${s}</div>`).join('')}</div>`;
}

function hubPanelHtml(c){
  if(!c.hub||c.hub==='No local hub')return'';
  const hub=HUBS.find(h=>h.name===c.hub);if(!hub)return'';
  return`<div class="hub-panel">
    <div class="hub-panel-hdr">Active agents — ${hub.name}</div>
    ${hub.agents.map(a=>{
      const connected=(c.agentsConnected||[]).includes(a.name);
      return`<div class="agent-row">
        <div><div class="agent-name">${a.name}</div><div class="agent-meta">${a.phone}</div></div>
        <div style="display:flex;align-items:center;gap:6px">

        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function connectAgent(id,name,phone){
  const c=contacts.find(x=>x.id===id);if(!c)return;
  if(!c.agentsConnected.includes(name))c.agentsConnected.push(name);
  if(!['Connected with agent','Converted'].includes(c.stage))c.stage='Connected with agent';
  const rep=document.getElementById('f-rep')?document.getElementById('f-rep').value:'';
  c.activities.push({id:Date.now(),dir:'outbound',type:'transfer',date:today,rep,notes:`3-way call initiated with ${name} (${phone}).`,outcome:''});
  save();buildDrawer(c);
}

          <label>Location / area</label>
          <input id="f-location" value="${c.location}" placeholder="e.g. Kano Central">
          ${c.firstDir==='inbound'?`<button class="loc-btn" onclick="alert('📍 Location request sent via WhatsApp — awaiting pin...')">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="5.5" r="2.5"/><path d="M7 14C7 14 1.5 9 1.5 5.5a5.5 5.5 0 0111 0C12.5 9 7 14 7 14z"/></svg>
            Send location request via WhatsApp
          </button>`:''}
          ${['NG Website form','Social media form'].includes(c.firstSource)?`<div style="font-size:11px;color:#3b6d11;margin-top:4px">⚑ GPS source — should auto-populate from form</div>`:''}
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">Hub & agent routing</div>
      <div class="fg" style="margin-bottom:8px">
        <div class="f"><label>Nearest hub</label>
          <select id="f-hub" onchange="hubSelectChanged(${c.id||0})">
            <option value="">— select hub —</option>
            ${HUBS.map(h=>`<option${h.name===c.hub?' selected':''}>${h.name}</option>`).join('')}
            <option value="No local hub"${c.hub==='No local hub'?' selected':''}>No local hub</option>
          </select>
        </div>
        <div class="f"><label>Agents connected</label>
          <input value="${(c.agentsConnected||[]).join(', ')||'—'}" class="auto-input" readonly>
        </div>
      </div>
      <div id="hub-panel">${hubPanelHtml(c)}</div>
    </div>
    <div class="sec">
      <div class="sec-title">Lead info</div>
      <div class="fg">
        <div class="f"><label>First contact direction</label>
          <select id="f-dir"><option value="inbound"${c.firstDir==='inbound'?' selected':''}>↙ Inbound</option><option value="outbound"${c.firstDir==='outbound'?' selected':''}>↗ Outbound</option></select>
        </div>
        <div class="f"><label>Source</label>
          <select id="f-source"><option value="">— select —</option>${allSources.map(s=>`<option${s===c.firstSource?' selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div class="f f-full"><label>Purpose</label>
          <select id="f-purpose"><option value="">— select —</option>${PURPOSES.map(p=>`<option${p===c.purpose?' selected':''}>${p}</option>`).join('')}</select>
        </div>
        <div class="f"><label>Stage</label>
          <select id="f-stage" onchange="stageChanged(this)">${STAGES.map(s=>`<option${s===c.stage?' selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div class="f"><label>Handling rep</label><input id="f-rep" value="${c.rep}" placeholder="Rep name"></div>
        <div class="f"><label>First contact date</label><input type="date" id="f-firstContact" value="${c.firstContact}"></div>
        <div class="f">
          <div class="f-lbl-row"><label>Follow-up due</label><span class="auto-tag">+7 weekdays</span></div>
          <input type="date" id="f-followUp" value="${c.followUp}">
        </div>
      </div>
      ${isComplaint?`<div class="alert alert-red"><strong>⚠ Complaint — escalate to Regional Team Lead</strong>Ensure all notes are complete before saving.</div>`:''}
      <div id="complaint-slot"></div>
    </div>
    <div class="sec">
      <div class="sec-title">Conversion tracking <span class="auto-tag">auto from MOPO Platform</span></div>
      <div class="fg">
        <div class="f"><div class="f-lbl-row"><label>App registration date</label><span class="auto-tag">auto</span></div>
          <input id="f-regDate" value="${c.regDate}" class="auto-input" placeholder="From MOPO Platform"></div>
        <div class="f"><div class="f-lbl-row"><label>First rental date</label><span class="auto-tag">auto</span></div>
          <input id="f-rentalDate" value="${c.rentalDate}" class="auto-input" placeholder="From MOPO Platform"></div>
      </div>
      ${isConverted(c)?`<div class="alert alert-green"><strong>✓ Converted — commission triggered</strong>Registration and first rental confirmed after first contact. Rep: ${c.rep||'—'}</div>`:''}
      ${c.regDate&&!c.rentalDate?`<div class="alert alert-amber">App registered — awaiting first rental to confirm conversion.</div>`:''}
    </div>
    ${!isNewC?`<div class="sec">
      <div class="sec-title">Activity log <span style="font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;color:#bbb;margin-left:4px">— full contact history</span></div>
      <div class="act-log">
        ${actHtml}
        <div class="act-add">
          <div class="act-add-row">
            <select id="act-dir"><option value="inbound">↙ Inbound</option><option value="outbound">↗ Outbound</option></select>
            <select id="act-type"><option value="call">Call</option><option value="transfer">Transfer</option><option value="note">Note</option></select>
            <select id="act-out"><option value="">— outcome —</option><option value="answered">Answered</option><option value="no-answer">No answer</option><option value="callback">Callback requested</option></select>
          </div>
          <textarea id="act-notes" placeholder="What was discussed, agreed, next steps..."></textarea>
          <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="addActivity(${c.id})">+ Log activity</button>
        </div>
      </div>
    </div>`:''}`;
}

function hubSelectChanged(id){
  const hub=document.getElementById('f-hub').value;
  const existing=id?contacts.find(c=>c.id===id):null;
  document.getElementById('hub-panel').innerHTML=hubPanelHtml({hub,agentsConnected:existing?existing.agentsConnected||[]:[]});
}
function stageChanged(sel){
  const slot=document.getElementById('complaint-slot');if(!slot)return;
  slot.innerHTML=sel.value==='Logged complaint'?`<div class="alert alert-red" style="margin-top:8px"><strong>⚠ Complaint — escalate to Regional Team Lead</strong></div>`:'';
}
function addActivity(id){
  const c=contacts.find(x=>x.id===id);
  const notes=(document.getElementById('act-notes')||{}).value||'';
  if(!c||!notes.trim())return;
  c.activities.push({id:Date.now(),dir:document.getElementById('act-dir').value,type:document.getElementById('act-type').value,date:today,rep:document.getElementById('f-rep')?document.getElementById('f-rep').value:'',notes:notes.trim(),outcome:document.getElementById('act-out').value});
  save();buildDrawer(c);
}
function openNew(){editId=null;buildDrawer(null);document.getElementById('overlay').classList.add('open')}
function openContact(id){editId=id;buildDrawer(contacts.find(c=>c.id===id));document.getElementById('overlay').classList.add('open')}
function closeDrawer(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeDrawer()}
function saveDrawer(){
  const existing=editId?contacts.find(c=>c.id===editId):null;
  const rec={
    id:editId||Date.now(),
    name:(document.getElementById('f-name')||{}).value||'',
    phone:(document.getElementById('f-phone')||{}).value||'',
    location:(document.getElementById('f-location')||{}).value||'',
    hub:(document.getElementById('f-hub')||{}).value||'',
    firstSource:(document.getElementById('f-source')||{}).value||'',
    firstDir:(document.getElementById('f-dir')||{}).value||'inbound',
    purpose:(document.getElementById('f-purpose')||{}).value||'',
    stage:(document.getElementById('f-stage')||{}).value||'New',
    rep:(document.getElementById('f-rep')||{}).value||'',
    firstContact:(document.getElementById('f-firstContact')||{}).value||today,
    followUp:(document.getElementById('f-followUp')||{}).value||'',
    regDate:(document.getElementById('f-regDate')||{}).value||'',
    rentalDate:(document.getElementById('f-rentalDate')||{}).value||'',
    agentsConnected:existing?existing.agentsConnected||[]:[],
    activities:existing?existing.activities||[]:[{id:Date.now(),dir:(document.getElementById('f-dir')||{}).value||'inbound',type:'sys',date:today,rep:'',notes:'Contact created.',outcome:''}],
  };
  if(!rec.name&&!rec.phone){alert('Name or phone required.');return}
  if(editId)contacts=contacts.map(c=>c.id===editId?rec:c);else contacts.push(rec);
  save();closeDrawer();
  if(currentTab==='today')renderToday();
  else if(currentTab==='pipeline')renderPipeline();
  else if(currentTab==='all')refilter();
  else if(currentTab==='reps')renderReps();
  renderMetrics();
}
function deleteLead(){
  if(!editId||!confirm('Delete this contact?'))return;
  contacts=contacts.filter(c=>c.id!==editId);
  save();closeDrawer();
  if(currentTab==='today')renderToday();
  else if(currentTab==='pipeline')renderPipeline();
  else if(currentTab==='all')refilter();
  else if(currentTab==='reps')renderReps();
  renderMetrics();
}

renderMetrics();
renderToday();
</script>
</body>
</html>
